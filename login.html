<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Login</title>
<style>
  *{
    -webkit-tap-highlight-color: transparent;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  form{
    display: grid;
    place-items: center;
  }
  h4{
    font-weight: normal;
    color: #5f6368;
  }
  .inp{
    position: relative;
    margin-bottom: 1rem;
  }
  input{
    width: 90vw;
    max-width: 350px;
    aspect-ratio: 5/1;
    border: 2px solid #dadce0;
    border-radius: 3rem;
    outline: none;
    font-size: 1.3rem;
    text-indent: 1.5rem;
  }
  input:focus{
    border-color: #4070F4;
  }
  label{
    position: absolute;
    pointer-events: none;
    top: 50%;
    left: 1.7rem;
    translate: 0 -50%;
    color: #5f6368;
    background-color: white;
    padding: .2rem;
    font-size: 1.3rem;
    transition: transform 0.2s ease, top 0.2s ease, font-size 0.2s ease, color 0.2s ease;
  }
  input:focus ~ label, input:not(:placeholder-shown) ~ label{
    top: 0;
    font-size: 1rem;
    font-weight: bold;
    color: #5f6368;
  }
  input:focus ~ label{
    color: #4070F4;
  }
  button{
    position: relative;
    font-size: 1.1rem;
    font-weight:bold;
    border: none;
    border-radius: 3rem;
    margin: 1rem 0;
    padding: 1rem 3rem;
    cursor: pointer;
    color: white;
    background: rgb(0, 100, 224);
  }
  .ripple{
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    background: rgba(255, 255, 255, 0.35);
    animation: expand-ripple 0.6s linear;
  }
  @keyframes expand-ripple{to{transform: scale(4);opacity: 0;}}
  @media (min-width: 500px){
    body{
      display: flex;
      align-items: center;
      justify-content: center;
      height: 95vh;
    }
    form{
      box-shadow:0 10px 30px rgba(0,0,0,.08);
      padding: 1rem 2rem;
      border-radius: 3rem;
    }
  }
</style>
</head>
