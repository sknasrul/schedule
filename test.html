<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Install</title>
  <link rel="manifest" href="manifest.json">
<style>
  *{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    -webkit-tap-highlight-color: transparent;
    margin: 0;
  }
  body{
    height: 100vh;
    display: flex;
    align-items: center;
    flex-direction: column;
    background:
      radial-gradient(1200px 600px at 10% -10%, oklch(90% .06 275 / .55), transparent 60%),
      radial-gradient(900px 500px at 100% 10%, oklch(90% .06 200 / .45), transparent 60%),
      radial-gradient(700px 500px at 50% 110%, oklch(90% .05 320 / .35), transparent 60%),
      #f6f7fb;
  }
  h1{
    font-size: 3rem;
    letter-spacing: -1px;
    text-align: center;
  }
  button{
    background-color: #1A73E8;
    color: #fff;
    cursor: pointer;
    font-size: 2rem;
    border-radius: 3rem;
    border: none;
    padding: .5rem 2rem .7rem 2rem;
    margin-top: 3rem;
  }
  button:hover{
    background-color: #185abc;
  }
</style>
</head>
<body>
  <img src="assets/icon192.png" alt="icon">
  <h1>All your needs<br> on Arcos</h1>
  <button id="installBtn">Install</button>
<script>
let deferredPrompt;

// Redirect if running as an installed PWA
function checkPWA() {
  const isPWA =
    window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true; // iOS Safari

  if (isPWA) {
    location.replace('/login.html');
  }
}

// Initial check
checkPWA();

// Listen for display mode changes
window.matchMedia('(display-mode: standalone')
  .addEventListener('change', checkPWA);

// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js');
  });
}

// Capture the install prompt
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'inline-block';
});

// Install button
installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
});

// Hide button after installation
window.addEventListener('appinstalled', () => {
  installBtn.style.display = 'none';
  checkPWA();
});
</script>
</body>
</html>
