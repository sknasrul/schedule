<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Duty Board · Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0a0f1c;
    --bg-2:#0d1426;
    --panel:#121a2c;
    --panel-border:#23304a;
    --text:#e8edf6;
    --muted:#7c8aa5;
    --amber:#ffb23f;
    --cyan:#36d1dc;
    --danger:#ff6b6b;
    --success:#4ade80;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 20% 15%, rgba(54,209,220,0.08), transparent 45%),
      radial-gradient(circle at 80% 85%, rgba(255,178,63,0.07), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }

  /* Ambient scanline grid, evokes a dispatch/control-room board */
  .grid-backdrop{
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 40%, transparent 90%);
    pointer-events:none;
  }
  .scanline{
    position:fixed; left:0; right:0; height:120px;
    background:linear-gradient(to bottom, transparent, rgba(54,209,220,0.05), transparent);
    animation: sweep 7s linear infinite;
    pointer-events:none;
  }
  @keyframes sweep{
    0%{ top:-120px; }
    100%{ top:100%; }
  }

  .wrap{
    position:relative;
    z-index:2;
    width:100%;
    max-width:400px;
    padding:24px;
    animation: rise .6s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(18px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:28px;
  }
  .brand-mark{
    width:34px; height:34px;
    border-radius:8px;
    background:linear-gradient(135deg, var(--amber), var(--cyan));
    position:relative;
    flex:none;
  }
  .brand-mark::after{
    content:"";
    position:absolute; inset:3px;
    border-radius:5px;
    background:var(--bg-2);
  }
  .brand-name{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:18px;
    letter-spacing:0.5px;
  }
  .brand-sub{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--muted);
    letter-spacing:1px;
    text-transform:uppercase;
    margin-top:-2px;
  }

  .panel{
    background:linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.01));
    border:1px solid var(--panel-border);
    border-radius:var(--radius);
    padding:32px 28px;
    backdrop-filter:blur(20px);
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
  }

  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:22px;
    margin:0 0 4px;
  }
  .lead{
    color:var(--muted);
    font-size:13.5px;
    margin:0 0 26px;
    line-height:1.5;
  }

  label{
    display:block;
    font-size:11.5px;
    font-weight:600;
    letter-spacing:0.6px;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:7px;
  }
  .field{ margin-bottom:18px; }
  .input-shell{
    position:relative;
    border:1px solid var(--panel-border);
    border-radius:10px;
    background:rgba(0,0,0,0.25);
    transition:border-color .2s, box-shadow .2s;
  }
  .input-shell:focus-within{
    border-color:var(--cyan);
    box-shadow:0 0 0 3px rgba(54,209,220,0.12);
  }
  input{
    width:100%;
    background:transparent;
    border:none;
    outline:none;
    color:var(--text);
    font-family:'JetBrains Mono',monospace;
    font-size:14.5px;
    padding:13px 14px;
    letter-spacing:0.4px;
  }
  input::placeholder{ color:#445069; font-family:'Inter',sans-serif; }

  button[type=submit]{
    width:100%;
    margin-top:6px;
    padding:13px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg, var(--amber), #ff9d2e);
    color:#1a1206;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:14.5px;
    letter-spacing:0.3px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  button[type=submit]:hover{ transform:translateY(-1px); box-shadow:0 8px 24px rgba(255,178,63,0.25); }
  button[type=submit]:active{ transform:translateY(0); }
  button[type=submit]:disabled{ opacity:0.6; cursor:default; transform:none; box-shadow:none; }

  .spinner{
    display:inline-block;
    width:14px; height:14px;
    border:2px solid rgba(26,18,6,0.3);
    border-top-color:#1a1206;
    border-radius:50%;
    animation:spin .7s linear infinite;
    vertical-align:-2px;
    margin-right:8px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .warning{
    display:none;
    align-items:flex-start;
    gap:9px;
    background:rgba(255,107,107,0.1);
    border:1px solid rgba(255,107,107,0.35);
    color:#ffb3b3;
    font-size:13px;
    padding:11px 13px;
    border-radius:9px;
    margin-bottom:18px;
    line-height:1.45;
  }
  .warning.show{
    display:flex;
    animation:shake .4s ease;
  }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-6px); }
    40%{ transform:translateX(5px); }
    60%{ transform:translateX(-3px); }
    80%{ transform:translateX(2px); }
  }

  .foot-note{
    text-align:center;
    color:var(--muted);
    font-size:11.5px;
    margin-top:20px;
    letter-spacing:0.3px;
  }
  .foot-note strong{ color:#a8b6d4; }

  .checking{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--bg);
    z-index:10;
    flex-direction:column;
    gap:14px;
  }
  .checking .spinner{
    width:26px;height:26px;border-width:3px;
    border-color:rgba(124,138,165,0.25);
    border-top-color:var(--cyan);
    margin:0;
  }
  .checking span{ color:var(--muted); font-size:12.5px; letter-spacing:0.5px; }
</style>
</head>
<body>

  <div class="checking" id="checking">
    <div class="spinner"></div>
    <span>CHECKING SESSION…</span>
  </div>

  <div class="grid-backdrop"></div>
  <div class="scanline"></div>

  <div class="wrap">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <div class="brand-name">Duty Board</div>
        <div class="brand-sub">Shift Schedule Portal</div>
      </div>
    </div>

    <div class="panel">
      <h1>Sign in</h1>
      <p class="lead">Enter your Arcos ID and full name to view today's shift and your schedule.</p>

      <div class="warning" id="warning"></div>

      <form id="loginForm" autocomplete="off">
        <div class="field">
          <label for="arcosId">Arcos ID</label>
          <div class="input-shell">
            <input type="text" id="arcosId" name="arcosId" placeholder="e.g. ARL33455" required />
          </div>
        </div>
        <div class="field">
          <label for="name">Full Name</label>
          <div class="input-shell">
            <input type="text" id="name" name="name" placeholder="As it appears on your roster" required />
          </div>
        </div>
        <button type="submit" id="submitBtn">Sign In</button>
      </form>

      <div class="foot-note">You'll stay signed in on this device — <strong>no need to log in again</strong>.</div>
    </div>
  </div>

<script>
  const form = document.getElementById('loginForm');
  const warning = document.getElementById('warning');
  const submitBtn = document.getElementById('submitBtn');
  const checking = document.getElementById('checking');

  function showWarning(msg){
    warning.textContent = msg;
    warning.classList.remove('show');
    void warning.offsetWidth; // restart animation
    warning.classList.add('show');
  }

  async function checkExistingSession(){
    try{
      const res = await fetch('/api/me', { credentials:'same-origin' });
      const data = await res.json();
      if(data.success){
        window.location.replace('/home.html');
        return;
      }
    }catch(e){ /* ignore, show the form */ }
    checking.style.display = 'none';
  }
  checkExistingSession();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const arcosId = document.getElementById('arcosId').value.trim();
    const name = document.getElementById('name').value.trim();
    if(!arcosId || !name){
      showWarning('Please fill in both your Arcos ID and your name.');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span>Signing in…';

    try{
      const res = await fetch('/api/login', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        credentials:'same-origin',
        body: JSON.stringify({ arcosId, name })
      });
      const data = await res.json();

      if(data.success){
        window.location.replace('/home.html');
      }else{
        showWarning(data.message || 'Arcos ID or name is incorrect.');
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Sign In';
      }
    }catch(err){
      showWarning('Could not connect. Please check your connection and try again.');
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Sign In';
    }
  });
</script>
</body>
</html>
