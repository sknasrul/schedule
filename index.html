<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Shift Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { height: 100%; overflow: hidden; overscroll-behavior-y: auto; }

  body {
    height: 100vh;
    height: var(--app-height, 100vh); /* only non-color variable in this file, set by JS for mobile browser chrome */
    width: 100%;
    overflow: hidden;
    overscroll-behavior-y: auto;
    font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
    color: #1e293b;
    display: flex;
    flex-direction: column;
    padding: clamp(10px, 2.5vw, 18px);
    gap: 12px;

    /* Light, airy wash over the photo -- keeps the scene visible but reads
       clearly as a bright, professional daytime surface.
       NOTE: now self-hosted -- put your image at /assets/background.jpg
       (or update this path + the matching path in sw.js's APP_SHELL list
       to wherever you actually serve it from). */
    background-image:
      linear-gradient(150deg, rgba(255,255,255,0.86) 0%, rgba(241,245,249,0.74) 45%, rgba(226,240,242,0.84) 100%),
      url('/background.avif');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #eef2f6;
  }

  .page {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
    gap: 14px;
    min-height: 0;
    animation: fadeUp .5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---------------------------------------------------------------------- */
  /* HEADER                                                                  */
  /* ---------------------------------------------------------------------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    min-height: 84px;
    padding: 14px clamp(16px, 3vw, 28px);
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(15, 23, 42, 0.10);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 12px 30px rgba(15,23,42,0.10);
    flex-shrink: 0;
  }

  .user-info { display: flex; align-items: center; gap: 13px; min-width: 0; }

  /* ---- animated avatar: spinning conic ring + status dot ---- */
  .avatar-wrap {
    position: relative;
    width: 46px;
    height: 46px;
    flex-shrink: 0;
  }
  .avatar-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #0891b2, #22d3ee, #67e8f9, #0891b2);
    animation: spin 5s linear infinite;
    transition: filter .3s ease;
  }
  .avatar {
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: linear-gradient(135deg, #22d3ee, #0891b2);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #06232b;
    transition: transform .25s cubic-bezier(.22,1,.36,1);
  }
  .avatar-wrap:hover .avatar { transform: scale(1.06); }
  .avatar-wrap:hover .avatar-ring { filter: brightness(1.15); animation-duration: 2s; }
  .status-dot {
    position: absolute;
    bottom: -1px;
    right: -1px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #33c17a;
    border: 2px solid rgba(255,255,255,0.95);
    animation: breathe 2.4s ease-in-out infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.15); opacity: .75; }
  }

  .user-text { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .user-id {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em; color: #64748b;
    background: rgba(15,23,42,0.06); padding: 2px 9px; border-radius: 999px; width: fit-content;
  }
  .user-name { font-size: 16px; font-weight: 700; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-name .wave { display: inline-block; }
  .user-sub { font-size: 11.5px; font-weight: 500; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .logout-btn {
    display: flex; align-items: center; justify-content: center;
    width: 42px; height: 42px; background: rgba(15,23,42,0.06);
    border: 1px solid rgba(15,23,42,0.10);
    border-radius: 50%; color: #1e293b; cursor: pointer; flex-shrink: 0;
    transition: transform .2s ease, background .2s ease, box-shadow .2s ease;
  }
  .logout-btn svg { width: 18px; height: 18px; }
  .logout-btn:hover { background: rgba(8,145,178,0.14); box-shadow: 0 0 0 3px rgba(8,145,178,0.14); transform: translateY(-1px); }
  .logout-btn:active { transform: translateY(0) scale(.94); }

  @media (max-width: 380px) {
    .user-name { font-size: 14.5px; }
    .user-sub { display: none; }
    header { min-height: 76px; }
  }

  /* ---------------------------------------------------------------------- */
  /* SWIPE HINT -- replaces the tab buttons. Small tappable line below the   */
  /* cards that always names the *other* card, with a chevron that points   */
  /* the direction of the swipe.                                            */
  /* ---------------------------------------------------------------------- */
  .swipe-hint {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    width: fit-content;
    max-width: 90vw;
    margin: 2rem auto;
    padding: 8px 18px;
    border-radius: 999px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(15,23,42,0.10);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #475569;
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    flex-shrink: 0;
    user-select: none;
    transition: background .2s ease, color .2s ease, border-color .2s ease, transform .2s ease;
  }
  .swipe-hint:hover { background: rgba(8,145,178,0.10); border-color: rgba(8,145,178,0.3); color: #0891b2; }
  .swipe-hint:active { transform: scale(0.97); }
  .swipe-hint svg {
    width: 13px; height: 13px;
    transition: transform .3s ease;
  }
  .swipe-hint.pointing-down svg { transform: rotate(180deg); }

  /* ---------------------------------------------------------------------- */
  /* CARD STACK -- credit-card styled shift cards                          */
  /* ---------------------------------------------------------------------- */
  .stack-wrap {
    flex: 1 1 auto; display: flex; flex-direction: column;
    align-items: center; justify-content: center; min-height: 0; position: relative;
  }

  .card-stack {
    position: relative;
    width: 90vw;
    max-width: 400px;
    height: min(230px, 27vh);
    perspective: 1200px;
    touch-action: none;
    overflow: visible;
  }

  .shift-card {
    position: absolute; inset: 0; border-radius: 22px;
    /* light "credit card" surface, day tone (default) */
    background: linear-gradient(135deg, #fef3e2 0%, #fde3b0 50%, #fef3e2 100%);
    border: 1px solid rgba(15,23,42,0.12);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.5) inset,
      0 22px 45px rgba(15,23,42,0.16);
    padding: 20px 22px;
    display: flex; flex-direction: column; justify-content: space-between;
    transform-style: preserve-3d;
    will-change: transform, opacity, filter;
    user-select: none; cursor: grab;
    overflow: hidden;
    transition: transform .5s cubic-bezier(.22,.85,.32,1), opacity .5s ease, filter .5s ease,
                background .3s ease;
  }
  .shift-card:active { cursor: grabbing; }

  /* diagonal light sheen across the card, like a card's foil strip */
  .shift-card::before {
    content: "";
    position: absolute;
    top: -60%; left: -20%;
    width: 60%; height: 220%;
    background: linear-gradient(120deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.08) 40%, transparent 70%);
    transform: rotate(12deg);
    pointer-events: none;
  }

  .shift-card.night {
    background: linear-gradient(135deg, #eef0ff 0%, #dbe0ff 50%, #eef0ff 100%);
  }
  .shift-card.weekoff {
    background: linear-gradient(135deg, #eafaf0 0%, #c9f0da 50%, #eafaf0 100%);
  }
  .shift-card.leave {
    background: linear-gradient(135deg, #fdeef1 0%, #f9d2dc 50%, #fdeef1 100%);
  }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; position: relative; z-index: 1; }
  .card-day-label { font-size: 11.5px; font-weight: 800; letter-spacing: 0.16em; color: #9c7a3f; }
  .shift-card.night .card-day-label { color: #6b74b8; }
  .shift-card.weekoff .card-day-label { color: #2f8f5b; }
  .shift-card.leave .card-day-label { color: #b0466f; }

  .card-date { font-size: 13.5px; font-weight: 600; color: #7a5f34; margin-top: 4px; }
  .shift-card.night .card-date { color: #4f5793; }
  .shift-card.weekoff .card-date { color: #256f47; }
  .shift-card.leave .card-date { color: #93395c; }

  /* badge in the corner, standing in for a card network logo */
  .shift-badge {
    width: 46px; height: 46px; border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #f2a93a, #f7c65f);
    box-shadow: 0 6px 16px rgba(242,169,58,0.35);
    flex-shrink: 0;
  }
  .shift-badge.night { background: linear-gradient(135deg, #6d7cff, #4c56c9); box-shadow: 0 6px 16px rgba(76,86,201,0.35); }
  .shift-badge.weekoff { background: linear-gradient(135deg, #34d399, #10b981); box-shadow: 0 6px 16px rgba(16,185,129,0.35); }
  .shift-badge.leave { background: linear-gradient(135deg, #fb7185, #e11d48); box-shadow: 0 6px 16px rgba(225,29,72,0.35); }

  .shift-badge svg { width: 24px; height: 24px; color: #3a2a10; }
  .shift-badge.night svg { color: #eef0ff; }
  .shift-badge.weekoff svg { color: #06281a; }
  .shift-badge.leave svg { color: #3a0d1a; }

  /* subtle animated glow ring behind the badge */
  .shift-badge { position: relative; }
  .shift-badge::after {
    content: "";
    position: absolute; inset: -5px;
    border-radius: 16px;
    border: 1.5px solid rgba(242,169,58,0.45);
    animation: pulseRing 2.4s ease-in-out infinite;
  }
  .shift-badge.night::after { border-color: rgba(109,124,255,0.45); }
  .shift-badge.weekoff::after { border-color: rgba(16,185,129,0.45); }
  .shift-badge.leave::after { border-color: rgba(225,29,72,0.45); }
  @keyframes pulseRing {
    0%, 100% { transform: scale(1); opacity: .55; }
    50%      { transform: scale(1.14); opacity: 0; }
  }

  .card-mid { position: relative; z-index: 1; }
  .shift-name {
    font-size: 24px; font-weight: 800; letter-spacing: 0.01em; color: #4a3510;
    line-height: 1.15;
  }
  .shift-card.night .shift-name { color: #232a5c; }
  .shift-card.weekoff .shift-name { color: #155c3a; }
  .shift-card.leave .shift-name { color: #7a2c4c; }

  .card-bottom { display: flex; align-items: flex-end; justify-content: space-between; position: relative; z-index: 1; }
  .shift-time-block { display: flex; flex-direction: column; gap: 2px; }
  .shift-time-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: #a3855a; }
  .shift-card.night .shift-time-label { color: #7c85c9; }
  .shift-card.weekoff .shift-time-label { color: #3a9868; }
  .shift-card.leave .shift-time-label { color: #b0466f; }

  .shift-time { font-size: 15px; font-weight: 700; color: #5b431c; letter-spacing: 0.04em; font-variant-numeric: tabular-nums; }
  .shift-card.night .shift-time { color: #383f7a; }
  .shift-card.weekoff .shift-time { color: #1f6b45; }
  .shift-card.leave .shift-time { color: #7a2c4c; }

  .card-chip {
    width: 38px; height: 28px; border-radius: 6px;
    background: linear-gradient(135deg, #e2c288, #f4e2ad, #e2c288);
    position: relative;
    box-shadow: 0 2px 4px rgba(15,23,42,0.2);
  }
  .card-chip::before {
    content: "";
    position: absolute; inset: 4px;
    border: 1px solid rgba(15,23,42,0.22);
    border-radius: 3px;
  }

  @media (min-width: 700px) and (min-height: 700px) {
    .card-stack { width: 340px; max-width: 340px; height: 224px; }
  }

  @media (max-height: 640px) {
    .card-stack { height: min(190px, 24vh); }
    header { min-height: 76px; padding: 12px clamp(14px, 3vw, 24px); }
    .avatar-wrap { width: 44px; height: 44px; }
    .avatar { font-size: 14px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .shift-card, .page, .shift-badge::after, .avatar-ring, .status-dot { transition: none !important; animation: none !important; }
  }

  /* ---------------------------------------------------------------------- */
  /* SKELETON / LOADING STATE FOR CARD CONTENT (shown until /shift resolves)*/
  /* ---------------------------------------------------------------------- */
  .skel {
    animation: skelPulse 1.2s ease-in-out infinite;
  }
  @keyframes skelPulse {
    0%, 100% { opacity: .35; }
    50%      { opacity: .8; }
  }

  /* ---------------------------------------------------------------------- */
  /* ACTION GRID -- Schedules / Presence on row 1, Forms / Payslip on row 2 */
  /* Windows-10-tile style torch/spotlight follows the cursor on hover.     */
  /* ---------------------------------------------------------------------- */
  .actions {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    flex-shrink: 0;
    width: 100%;
    max-width: 460px;
    margin: 0 auto;
  }

  .action-btn {
    --mx: 50%;
    --my: 50%;
    position: relative;
    width: 100%;
    min-height: 84px;
    border-radius: 18px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(15,23,42,0.10);
    display: flex; flex-direction: row; align-items: center; justify-content: flex-start;
    gap: 12px; padding: 0 18px; cursor: pointer; overflow: hidden;
    color: #1e293b; font-family: inherit;
    transition: transform .2s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
  }

  /* the torch: a soft radial glow that tracks the mouse, revealed on hover */
  .action-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(160px circle at var(--mx) var(--my), rgba(8,145,178,0.22), transparent 68%);
    opacity: 0;
    transition: opacity .35s ease;
    pointer-events: none;
    z-index: 0;
  }
  .action-btn:hover::before,
  .action-btn:focus-visible::before { opacity: 1; }

  .action-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 26px rgba(15,23,42,0.12), 0 0 0 1px rgba(8,145,178,0.25) inset;
    border-color: rgba(8,145,178,0.35);
  }
  .action-btn:active { transform: translateY(0) scale(0.98); }

  .action-btn .icon-wrap {
    width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(8,145,178,0.12);
    color: #0891b2;
    position: relative; z-index: 1;
  }
  .action-btn .icon-wrap svg { width: 21px; height: 21px; }
  .action-btn .label { font-size: 14.5px; font-weight: 700; z-index: 1; position: relative; }

  @media (min-width: 700px) {
    .action-btn { min-height: 92px; }
    .action-btn .label { font-size: 15px; }
  }

  /* ---------------------------------------------------------------------- */
  /* ERROR OVERLAY (only shown on a genuine load failure)                   */
  /* ---------------------------------------------------------------------- */
  .state-overlay {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; background: rgba(238,242,246,0.85);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    color: #1e293b; font-weight: 600; font-size: 14px; text-align: center; padding: 24px;
    z-index: 50;
  }
  .state-overlay.hidden { display: none; }
  .retry-btn {
    margin-top: 6px; padding: 9px 20px; border-radius: 999px; border: none;
    background: linear-gradient(135deg, #22d3ee, #0891b2); color: #06232b; font-weight: 700; cursor: pointer;
  }
</style>
</head>
<body>

  <div id="errorOverlay" class="state-overlay hidden">
    <div id="errorMessage">Something went wrong.</div>
    <button class="retry-btn" id="retryBtn">Retry</button>
  </div>

  <div class="page" id="pageContent" style="visibility:hidden;">
    <header>
      <div class="user-info">
        <div class="avatar-wrap" title="Online">
          <div class="avatar-ring"></div>
          <div class="avatar" id="avatarInitials">--</div>
          <div class="status-dot"></div>
        </div>
        <div class="user-text">
          <span class="user-id" id="userId">-------</span>
          <span class="user-name">Hello, <span id="userName">-</span> <span class="wave">👋</span></span>
          <span class="user-sub">Here's what's happening today.</span>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn" title="Logout" aria-label="Logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </header>

    <div class="stack-wrap">
      <!-- Only 2 cards, written statically here: Today and Tomorrow. They are never
           created or destroyed -- swiping or tapping the swipe-hint below only
           flips which one is on top. The back card's edge is left peeking out
           from behind the front card so it's obvious there's another one.
           Content starts as a "skel" (skeleton pulse) placeholder and is
           replaced once /shift resolves (or instantly from cache, see script). -->
      <div class="card-stack" id="cardStack">

        <div class="shift-card" id="card-today" data-key="today">
          <div class="card-top">
            <div>
              <div class="card-day-label">TODAY</div>
              <div class="card-date" id="date-today"></div>
            </div>
            <div class="shift-badge skel" id="badge-today">
              <div id="icon-today"></div>
            </div>
          </div>
          <div class="card-mid">
            <div class="shift-name skel" id="name-today">Loading shift…</div>
          </div>
          <div class="card-bottom">
            <div class="shift-time-block">
              <span class="shift-time-label">SHIFT TIME</span>
              <span class="shift-time skel" id="time-today">— — : — —</span>
            </div>
            <div class="card-chip"></div>
          </div>
        </div>

        <div class="shift-card" id="card-tomorrow" data-key="tomorrow">
          <div class="card-top">
            <div>
              <div class="card-day-label">TOMORROW</div>
              <div class="card-date" id="date-tomorrow"></div>
            </div>
            <div class="shift-badge skel" id="badge-tomorrow">
              <div id="icon-tomorrow"></div>
            </div>
          </div>
          <div class="card-mid">
            <div class="shift-name skel" id="name-tomorrow">Loading shift…</div>
          </div>
          <div class="card-bottom">
            <div class="shift-time-block">
              <span class="shift-time-label">SHIFT TIME</span>
              <span class="shift-time skel" id="time-tomorrow">— — : — —</span>
            </div>
            <div class="card-chip"></div>
          </div>
        </div>

      </div>

      <!-- Swipe hint line -- replaces the old Today/Tomorrow tab buttons.
           Always names the *other* card and points the direction to swipe.
           Tapping it also triggers the flip, same as swiping. -->
      <div class="swipe-hint" id="swipeHint" role="button" tabindex="0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="18 15 12 9 6 15"/>
        </svg>
        <span id="swipeHintText">Swipe up for tomorrow</span>
      </div>
    </div>

    <!-- 2x2 action grid: row 1 = Schedules, Presence · row 2 = Forms, Payslip -->
    <div class="actions">
      <button class="action-btn" data-action="schedules" onclick="window.location.href='/schedules'">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <span class="label">Schedules</span>
      </button>
      <button class="action-btn" data-action="presence" onclick="window.location.href='/presents'">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/>
          </svg>
        </div>
        <span class="label">Presents</span>
      </button>
      <button class="action-btn" data-action="forms" onclick="window.location.href='/forms'">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </div>
        <span class="label">Forms</span>
      </button>
      <button class="action-btn" data-action="payslip" onclick="window.location.href='/payslip'">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/>
            <line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="16" y2="11"/><line x1="8" y1="15" x2="12" y2="15"/>
          </svg>
        </div>
        <span class="label">Payslip</span>
      </button>
    </div>
  </div>

<script>
  /* ================= Mobile viewport-height fix ================= */
  function setAppHeight(){
    document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
  }
  setAppHeight();
  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', setAppHeight);

  /* ================= Service worker registration ================= */
  /* Caches the app shell (this page + the self-hosted background image)
     for instant repeat loads and offline access. Deliberately does NOT
     touch /shift -- see sw.js, which hard-codes that endpoint to always
     go to the network so shift data is always fetched live from the
     database, never served from a cache. */
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .catch(err => console.warn('Service worker registration failed:', err));
    });
  }

  /* ================= Overlay helpers ================= */
  const errorOverlay = document.getElementById('errorOverlay');
  const errorMessage = document.getElementById('errorMessage');
  const pageContent = document.getElementById('pageContent');

  function showError(msg){
    errorOverlay.classList.remove('hidden');
    errorMessage.textContent = msg;
  }
  function clearError(){
    errorOverlay.classList.add('hidden');
  }

  document.getElementById('retryBtn').addEventListener('click', () => { clearError(); loadShiftData(); });

  /* ================= Cookie helper ================= */
  function getCookie(name){
    const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
    return match ? decodeURIComponent(match[1]) : null;
  }

  /* NOTE: Shift data returned from /shift is never cached (no localStorage /
     sessionStorage). It's always fetched fresh from the server on every page
     load. Only the already-public id/name cookies are used for the instant
     header paint below. */

  /* ================= User rendering (from cookies, instant -- no server round trip) ================= */
  function renderUser(id, name){
    document.getElementById('userId').textContent = id;
    document.getElementById('userName').textContent = name;
    document.getElementById('avatarInitials').textContent = name
      .split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  }

  /* ================= INSTANT AUTH CHECK ================= */
  /* Runs synchronously before anything else: reads id/name straight from
     cookies and paints the header immediately. No loading screen, no
     round trip to the server just to show who's logged in. Only the
     shift data (today/tomorrow) is fetched async afterward. */
  const cookieId = getCookie('id');
  const cookieName = getCookie('name');

  if(!cookieId || !cookieName){
    window.location.href = '/login';
  } else {
    renderUser(cookieId, cookieName);
    pageContent.style.visibility = 'visible';
  }

  /* ================= Shift icons (plain inline SVG, no animation library) ================= */
  const sunIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
  const moonIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  const weekOffIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M9 16l2 2 4-4"/></svg>`;
  const leaveIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1.5 3 1 1 3L8 20l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.3c.4-.2.6-.6.5-1.1L17.8 19.2Z"/></svg>`;

  /* ================= Date formatting (real, not data) ================= */
  function formatDate(offset){
    const d = new Date();
    d.setDate(d.getDate() + offset);
    return d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
  }

  /* ================= Real KV-backed shift lookup ================= */
  /* `cls` is the extra class applied to both the card and its badge to pick
     up the matching color variant (empty string = default "day" look). */
  const SHIFT_TYPES = {
    'Day Shift':   { time:'09:00 — 18:00', icon:sunIcon,     cls:''        },
    'Night Shift': { time:'20:00 — 05:00', icon:moonIcon,    cls:'night'   },
    'Week Off':    { time:'All Day',       icon:weekOffIcon, cls:'weekoff' },
    'Leave':       { time:'All Day',       icon:leaveIcon,   cls:'leave'   }
  };
  const ALL_VARIANT_CLASSES = ['night', 'weekoff', 'leave'];

  // Returns a display object for a known shift label, or null if the value
  // is missing/unrecognized -- never guesses.
  function shiftInfoFromLabel(label){
    const known = SHIFT_TYPES[label];
    if(!known) return null;
    return { label, ...known };
  }

  async function fetchShiftData(retriesLeft = 1){
    const res = await fetch('/shift', { credentials: 'same-origin' });
    if(res.status === 401){
      // Don't trust a single 401 -- could be a race with a token refresh,
      // a transient server hiccup, etc. Retry once before treating this
      // as a real logout.
      if(retriesLeft > 0){
        await new Promise(r => setTimeout(r, 400));
        return fetchShiftData(retriesLeft - 1);
      }
      window.location.href = '/login';
      return null;
    }
    if(!res.ok){
      let detail = '';
      try{ detail = (await res.json()).error || ''; }catch(e){}
      throw new Error(detail || `Request failed (${res.status})`);
    }
    return res.json(); // { id, today, tomorrow }
  }

  function populateCard(key, offset, shift){
    document.getElementById(`date-${key}`).textContent = formatDate(offset);
    const cardEl = document.getElementById(`card-${key}`);
    const badgeEl = document.getElementById(`badge-${key}`);
    const nameEl = document.getElementById(`name-${key}`);
    const timeEl = document.getElementById(`time-${key}`);
    const iconEl = document.getElementById(`icon-${key}`);

    // Clear skeleton pulse + any previous variant class, then re-apply
    // whichever variant actually applies (if any).
    nameEl.classList.remove('skel');
    timeEl.classList.remove('skel');
    badgeEl.classList.remove('skel', ...ALL_VARIANT_CLASSES);
    cardEl.classList.remove(...ALL_VARIANT_CLASSES);

    if(!shift){
      nameEl.textContent = 'No schedule';
      timeEl.textContent = '—';
      iconEl.innerHTML = '';
      return;
    }
    nameEl.textContent = shift.label;
    timeEl.textContent = shift.time;
    iconEl.innerHTML = shift.icon;
    if(shift.cls){
      cardEl.classList.add(shift.cls);
      badgeEl.classList.add(shift.cls);
    }
  }

  async function loadShiftData(){
    try{
      const data = await fetchShiftData();
      if(!data) return; // redirected to /login
      populateCard('today', 0, shiftInfoFromLabel(data.today));
      populateCard('tomorrow', 1, shiftInfoFromLabel(data.tomorrow));
    }catch(e){
      console.error('Shift load failed:', e);
      showError('Could not load your schedule. Check your connection and try again.');
    }
  }

  // Only kick off the shift fetch once we know the user is authenticated
  // (i.e. we didn't just redirect to /login above).
  if(cookieId && cookieName){
    // Dates render immediately even before the fetch resolves; the shift
    // name/time/icon stay in their skeleton state until /shift responds,
    // then loadShiftData() fetches fresh data from the server every time.
    document.getElementById('date-today').textContent = formatDate(0);
    document.getElementById('date-tomorrow').textContent = formatDate(1);
    loadShiftData();
  }

  /* ================= Logout ================= */
  document.getElementById('logoutBtn').addEventListener('click', () => {
    document.cookie = 'id=; Max-Age=0; path=/';
    document.cookie = 'name=; Max-Age=0; path=/';
    window.location.href = '/login';
  });

  /* ================= Slot rotation (2 fixed cards, never rebuilt) ================= */
  const EL = {
    today:    document.getElementById('card-today'),
    tomorrow: document.getElementById('card-tomorrow')
  };

  let slots = { front:'today', back:'tomorrow' };
  let isAnimating = false;

  // Back card is offset further down and left just slightly smaller than the
  // front card, so a visible sliver of its bottom edge peeks out -- signals
  // "there's another card here" without needing a label.
  const REST = {
    front:{ y:0,  scale:1,    opacity:1,    blur:0,  z:10 },
    back: { y:24, scale:0.95, opacity:0.85, blur:0,  z:9  }
  };

  function applyRest(el, slotName, withTransition){
    const r = REST[slotName];
    el.style.transition = withTransition
      ? 'transform .5s cubic-bezier(.22,.85,.32,1), opacity .5s ease, filter .5s ease'
      : 'none';
    el.style.transform = `translateY(${r.y}px) scale(${r.scale}) rotateX(0deg)`;
    el.style.opacity = r.opacity;
    el.style.filter = r.blur ? `blur(${r.blur}px)` : 'none';
    el.style.zIndex = r.z;
  }

  const swipeHint = document.getElementById('swipeHint');
  const swipeHintText = document.getElementById('swipeHintText');
  const HINT_LABEL = { today: 'tomorrow', tomorrow: 'today' };

  function updateSwipeHint(){
    const otherKey = slots.back; // the card currently hidden behind the front one
    const pointingDown = otherKey === 'today'; // today sits "before" tomorrow, so swipe down to see it
    swipeHint.classList.toggle('pointing-down', pointingDown);
    swipeHintText.textContent = `Swipe ${pointingDown ? 'down' : 'up'} for ${HINT_LABEL[slots.front]}`;
  }

  Object.keys(slots).forEach(slotName => applyRest(EL[slots[slotName]], slotName, false));
  updateSwipeHint();

  const FLIP_MS = 460;

  function flip(direction){
    // direction: 1 = swipe up (reveal the other card from below), -1 = swipe down
    if(isAnimating) return;
    isAnimating = true;

    const outKey = slots.front, inKey = slots.back;
    const outEl = EL[outKey], inEl = EL[inKey];

    const flyY = direction === 1 ? -60 : 60;
    const rx = direction === 1 ? -100 : 100;

    outEl.style.transition = `transform ${FLIP_MS/2}ms ease-in, opacity ${FLIP_MS/2}ms ease, filter ${FLIP_MS/2}ms ease`;
    outEl.style.transform = `translateY(${flyY}px) scale(0.9) rotateX(${rx}deg)`;
    outEl.style.opacity = '0.12';
    outEl.style.zIndex = 11;

    applyRest(inEl, 'front', true);

    setTimeout(() => {
      outEl.style.transition = `transform ${FLIP_MS/2}ms ease-out, opacity ${FLIP_MS/2}ms ease, filter ${FLIP_MS/2}ms ease`;
      outEl.style.zIndex = REST.back.z;
      outEl.style.transform = `translateY(${REST.back.y}px) scale(${REST.back.scale}) rotateX(0deg)`;
      outEl.style.opacity = REST.back.opacity;
      outEl.style.filter = REST.back.blur ? `blur(${REST.back.blur}px)` : 'none';
    }, FLIP_MS/2);

    setTimeout(() => {
      slots = { front:inKey, back:outKey };
      isAnimating = false;
      updateSwipeHint();
    }, FLIP_MS);
  }

  const rotateUp = () => flip(1);
  const rotateDown = () => flip(-1);

  // Tapping/clicking the swipe hint triggers the same flip as a swipe would.
  function triggerHintFlip(){
    if(isAnimating) return;
    slots.back === 'today' ? rotateDown() : rotateUp();
  }
  swipeHint.addEventListener('click', triggerHintFlip);
  swipeHint.addEventListener('keydown', e => {
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); triggerHintFlip(); }
  });

  /* ================= Drag handling (swipe still works alongside the hint) ================= */
  const stackEl = document.getElementById('cardStack');
  const COMMIT_THRESHOLD = 65;
  let startY = null, dragging = false, dragEl = null;

  function dragStart(y){
    if(isAnimating) return;
    dragEl = EL[slots.front];
    startY = y; dragging = true;
    dragEl.style.transition = 'none';
  }
  function dragMove(y){
    if(!dragging || startY === null || !dragEl) return;
    const delta = y - startY;
    dragEl.style.transform = `translateY(${delta * 0.8}px) rotate(${delta * 0.02}deg) scale(1)`;
  }
  function dragEnd(y){
    if(!dragging || startY === null || !dragEl) return;
    const delta = y - startY;
    dragging = false;
    const el = dragEl;
    dragEl = null; startY = null;
    if(Math.abs(delta) > COMMIT_THRESHOLD){
      delta < 0 ? rotateUp() : rotateDown();
    } else {
      applyRest(el, 'front', true);
    }
  }

  stackEl.addEventListener('mousedown', e => dragStart(e.clientY));
  window.addEventListener('mousemove', e => dragMove(e.clientY));
  window.addEventListener('mouseup', e => dragEnd(e.clientY));
  stackEl.addEventListener('touchstart', e => dragStart(e.touches[0].clientY), {passive:true});
  stackEl.addEventListener('touchmove', e => dragMove(e.touches[0].clientY), {passive:true});
  stackEl.addEventListener('touchend', e => dragEnd(e.changedTouches[0].clientY));

  let wheelLock = false;
  document.querySelector('.stack-wrap').addEventListener('wheel', e => {
    if(isAnimating || wheelLock) return;
    if(Math.abs(e.deltaY) < 25) return;
    wheelLock = true;
    e.deltaY > 0 ? rotateUp() : rotateDown();
    setTimeout(() => wheelLock = false, FLIP_MS + 100);
  }, {passive:true});

  document.addEventListener('keydown', e => {
    if(e.key === 'ArrowUp') rotateUp();
    if(e.key === 'ArrowDown') rotateDown();
  });

  /* ================= Windows-10-tile style torch/spotlight on hover ================= */
  document.querySelectorAll('.action-btn').forEach(btn => {
    btn.addEventListener('mousemove', e => {
      const rect = btn.getBoundingClientRect();
      btn.style.setProperty('--mx', `${e.clientX - rect.left}px`);
      btn.style.setProperty('--my', `${e.clientY - rect.top}px`);
    });
    // Keyboard focus: center the torch so focus-visible still gets the glow.
    btn.addEventListener('focus', () => {
      btn.style.setProperty('--mx', '50%');
      btn.style.setProperty('--my', '50%');
    });
  });
</script>

</body>
</html>
