<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Shift Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    /* 👉 Replace this URL with your own background photo */
    --bg-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRsld00P-Uk05dRZhB_31vkySwWZDiXDKIODMK0wxEdMN_p26upEeBp7JY&s=10');
    --grad-overlay: linear-gradient(160deg, rgba(179,136,232,0.88) 0%, rgba(236,111,199,0.82) 35%, rgba(255,143,176,0.78) 60%, rgba(255,176,138,0.82) 100%);
    --card-bg: linear-gradient(160deg,#fdeedd,#fbe0cf);
    --ink: #2c2440;
    --muted: #6f6580;
    --glass: rgba(255,255,255,0.24);
    --glass-border: rgba(255,255,255,0.55);
    --app-height: 100vh;
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  html{
    height:100%;
    overflow:hidden;
    overscroll-behavior-y:auto;
  }

  body{
    height:100vh;
    height:var(--app-height);
    width:100%;
    overflow:hidden;
    overscroll-behavior-y:auto;
    font-family:'Inter', system-ui, -apple-system, sans-serif;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    padding:14px;
    gap:12px;
    background: var(--grad-overlay), var(--bg-image);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .page{
    display:flex;
    flex-direction:column;
    height:100%;
    width:100%;
    max-width:1100px;
    margin:0 auto;
    gap:14px;
    min-height:0;
    animation: fadeUp .6s ease both;
  }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ---------- HEADER ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 16px;
    border-radius:22px;
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    box-shadow:0 0 22px rgba(255,255,255,0.28), 0 10px 30px rgba(40,10,50,0.2);
    flex-shrink:0;
  }

  .user-info{ display:flex; align-items:center; gap:11px; min-width:0; }

  .avatar{
    width:40px; height:40px; border-radius:50%;
    background:rgba(255,255,255,0.6);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:14px; color:var(--ink); flex-shrink:0;
  }

  .user-text{ display:flex; flex-direction:column; gap:2px; min-width:0; }
  .user-id{
    font-size:10px; font-weight:600; letter-spacing:0.03em; color:var(--muted);
    background:rgba(255,255,255,0.55); padding:2px 9px; border-radius:999px; width:fit-content;
  }
  .user-name{ font-size:15.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .logout-btn{
    display:flex; align-items:center; justify-content:center;
    width:38px; height:38px; background:rgba(255,255,255,0.6);
    border:none; border-radius:50%; color:var(--ink); cursor:pointer; flex-shrink:0;
    transition:transform .25s ease, background .25s ease, box-shadow .25s ease;
  }
  .logout-btn svg{ width:17px; height:17px; }
  .logout-btn:hover{ background:#fff; transform:translateY(-1px); box-shadow:0 0 14px rgba(255,255,255,0.6), 0 6px 16px rgba(80,20,80,0.18); }
  .logout-btn:active{ transform:translateY(0) scale(.94); }

  /* ---------- CARD STACK (Today + Tomorrow only) ---------- */
  .stack-wrap{
    flex:1 1 auto; display:flex; flex-direction:column;
    align-items:center; justify-content:center; min-height:0; position:relative;
  }

  .card-stack{
    position:relative;
    width:90vw;
    max-width:400px;
    height:min(215px, 25vh);
    perspective:1200px;
    touch-action:none;
  }

  .shift-card{
    position:absolute; inset:0; border-radius:26px;
    background:var(--card-bg);
    border:1.5px solid rgba(255,255,255,0.6);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.12),
      0 0 32px 2px rgba(255,255,255,0.4),
      0 20px 45px rgba(60,15,55,0.28);
    padding:18px 20px;
    display:flex; flex-direction:column; justify-content:space-between;
    transform-style:preserve-3d;
    will-change:transform, opacity, filter;
    user-select:none; cursor:grab;
    transition: transform .5s cubic-bezier(.22,.85,.32,1), opacity .5s ease, filter .5s ease;
  }
  .shift-card:active{ cursor:grabbing; }

  .vibe-orb{ position:absolute; top:12px; right:46px; width:30px; height:30px; pointer-events:none; }

  .card-top{ display:flex; align-items:flex-start; justify-content:space-between; }
  .card-day-label{ font-size:11px; font-weight:700; letter-spacing:0.12em; color:var(--muted); }
  .card-date{ font-size:14.5px; font-weight:600; color:var(--ink); margin-top:3px; }

  .card-arrows{ display:flex; flex-direction:column; gap:2px; color:var(--muted); opacity:.6; }
  .card-arrows svg{ width:14px; height:14px; }

  .card-bottom{ display:flex; align-items:center; gap:13px; }

  .shift-icon{
    width:52px; height:52px; border-radius:15px;
    background:rgba(255,214,120,0.5);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; position:relative; overflow:hidden;
  }
  .shift-icon.night{ background:rgba(150,160,255,0.35); }
  .icon-lottie{ width:78%; height:78%; }
  .icon-fallback{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .icon-fallback svg{ width:26px; height:26px; }

  .shift-name{ font-size:21px; font-weight:800; line-height:1.1; }
  .shift-time{ font-size:12.5px; color:var(--muted); font-weight:500; margin-top:2px; }

  .swipe-hint{
    margin-top:10px; display:flex; gap:22px; font-size:12px; font-weight:600;
    color:rgba(255,255,255,0.9); text-shadow:0 1px 4px rgba(60,20,60,0.3);
    align-items:center; flex-shrink:0;
  }
  .swipe-hint span{ display:flex; align-items:center; gap:4px; cursor:pointer; padding:4px 6px; border-radius:8px; transition:background .2s ease; }
  .swipe-hint span:hover{ background:rgba(255,255,255,0.18); }
  .swipe-hint svg{ width:12px; height:12px; }

  /* ---------- ACTION BUTTONS ---------- */
  .actions{ display:flex; justify-content:center; gap:16px; flex-shrink:0; }

  .action-btn{
    position:relative;
    width:104px; height:98px;
    border-radius:22px;
    background:rgba(255,255,255,0.3);
    border:1px solid rgba(255,255,255,0.45);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:7px; cursor:pointer; overflow:hidden;
    color:var(--ink); font-family:inherit;
    transition:transform .2s ease, box-shadow .2s ease, background .2s ease;
  }

  .action-btn:hover{
    transform:translateY(-4px) scale(1.045);
    box-shadow:0 0 22px rgba(255,255,255,0.5), 0 14px 30px rgba(60,15,55,0.28);
    background:rgba(255,255,255,0.4);
  }
  .action-btn:active{ transform:translateY(-1px) scale(0.98); }

  .action-btn .glow{
    position:absolute; width:160px; height:160px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 70%);
    left:var(--x, 50%); top:var(--y, 50%); transform:translate(-50%,-50%);
    opacity:0; transition:opacity .3s ease; pointer-events:none;
  }
  .action-btn:hover .glow{ opacity:1; }

  .action-btn svg{ width:26px; height:26px; z-index:1; position:relative; }
  .action-btn .label{ font-size:13px; font-weight:700; z-index:1; position:relative; }

  @media (min-width:700px) and (min-height:700px){
    .card-stack{ width:340px; max-width:340px; height:214px; }
    .action-btn{ width:118px; height:110px; }
    .action-btn svg{ width:28px; height:28px; }
    .action-btn .label{ font-size:14px; }
  }

  @media (max-height:640px){
    .card-stack{ height:min(180px, 22vh); }
    .actions{ gap:12px; }
    .action-btn{ width:88px; height:82px; }
    .action-btn svg{ width:22px; height:22px; }
    header{ min-height:70px; padding:14px 20px; }
    .avatar{ width:44px; height:44px; font-size:15px; }
  }

  @media (prefers-reduced-motion: reduce){
    .shift-card, .page{ transition:none !important; animation:none !important; }
  }

  /* ---------- STATE OVERLAYS ---------- */
  .state-overlay{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:12px; background:rgba(44,36,64,0.35);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    color:#fff; font-weight:600; font-size:14px; text-align:center; padding:24px;
    z-index:50;
  }
  .state-overlay.hidden{ display:none; }
  .spinner{
    width:34px; height:34px; border-radius:50%;
    border:3px solid rgba(255,255,255,0.35); border-top-color:#fff;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .retry-btn{
    margin-top:6px; padding:8px 18px; border-radius:999px; border:none;
    background:#fff; color:var(--ink); font-weight:700; cursor:pointer;
  }
</style>
</head>
<body>

  <div id="loadingOverlay" class="state-overlay">
    <div class="spinner"></div>
    <div>Loading your schedule…</div>
  </div>

  <div id="errorOverlay" class="state-overlay hidden">
    <div id="errorMessage">Something went wrong.</div>
    <button class="retry-btn" id="retryBtn">Retry</button>
  </div>

  <div class="page" id="pageContent" style="visibility:hidden;">
    <header>
      <div class="user-info">
        <div class="avatar" id="avatarInitials">--</div>
        <div class="user-text">
          <span class="user-id" id="userId">-------</span>
          <span class="user-name" id="userName">Loading…</span>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn" title="Logout" aria-label="Logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </header>

    <div class="stack-wrap">
      <!-- Only 2 cards, written statically here: Today and Tomorrow. They are never
           created or destroyed — swiping only flips which one is on top. -->
      <div class="card-stack" id="cardStack">

        <div class="shift-card" id="card-today" data-key="today">
          <div class="vibe-orb" id="vibe-today" aria-hidden="true"></div>
          <div class="card-top">
            <div>
              <div class="card-day-label">TODAY</div>
              <div class="card-date" id="date-today"></div>
            </div>
            <div class="card-arrows">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
          <div class="card-bottom">
            <div class="shift-icon" id="icon-today">
              <div class="icon-fallback" id="icon-fallback-today"></div>
              <div class="icon-lottie"></div>
            </div>
            <div>
              <div class="shift-name" id="name-today"></div>
              <div class="shift-time" id="time-today"></div>
            </div>
          </div>
        </div>

        <div class="shift-card" id="card-tomorrow" data-key="tomorrow">
          <div class="vibe-orb" id="vibe-tomorrow" aria-hidden="true"></div>
          <div class="card-top">
            <div>
              <div class="card-day-label">TOMORROW</div>
              <div class="card-date" id="date-tomorrow"></div>
            </div>
            <div class="card-arrows">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
          <div class="card-bottom">
            <div class="shift-icon" id="icon-tomorrow">
              <div class="icon-fallback" id="icon-fallback-tomorrow"></div>
              <div class="icon-lottie"></div>
            </div>
            <div>
              <div class="shift-name" id="name-tomorrow"></div>
              <div class="shift-time" id="time-tomorrow"></div>
            </div>
          </div>
        </div>

      </div>

      <div class="swipe-hint">
        <span id="hintDown">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          Today
        </span>
        <span id="hintUp">
          Tomorrow
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
        </span>
      </div>
    </div>

    <div class="actions">
      <button class="action-btn" data-action="schedules" onclick="window.location.href='/schedules'">
        <div class="glow"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span class="label">Schedules</span>
      </button>
      <button class="action-btn" data-action="presence" onclick="window.location.href='/presents'">
        <div class="glow"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/>
        </svg>
        <span class="label">Presence</span>
      </button>
      <button class="action-btn" data-action="forms" onclick="window.location.href='/forms'">
        <div class="glow"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span class="label">Forms</span>
      </button>
    </div>
  </div>

<script>
  /* ================= Mobile viewport-height fix ================= */
  function setAppHeight(){
    document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
  }
  setAppHeight();
  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', setAppHeight);

  /* ================= State overlay helpers ================= */
  const loadingOverlay = document.getElementById('loadingOverlay');
  const errorOverlay = document.getElementById('errorOverlay');
  const errorMessage = document.getElementById('errorMessage');
  const pageContent = document.getElementById('pageContent');

  function showLoading(){
    loadingOverlay.classList.remove('hidden');
    errorOverlay.classList.add('hidden');
    pageContent.style.visibility = 'hidden';
  }
  function showError(msg){
    loadingOverlay.classList.add('hidden');
    errorOverlay.classList.remove('hidden');
    errorMessage.textContent = msg;
    pageContent.style.visibility = 'hidden';
  }
  function showPage(){
    loadingOverlay.classList.add('hidden');
    errorOverlay.classList.add('hidden');
    pageContent.style.visibility = 'visible';
  }

  document.getElementById('retryBtn').addEventListener('click', () => loadDashboard());

  /* ================= Cookie helper ================= */
  function getCookie(name){
    const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
    return match ? decodeURIComponent(match[1]) : null;
  }

  /* ================= User rendering (from cookies) ================= */
  function renderUser(id, name){
    document.getElementById('userId').textContent = id;
    document.getElementById('userName').textContent = name;
    document.getElementById('avatarInitials').textContent = name
      .split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  }

  /* ================= Embedded Lottie animations (visual assets, not data) ================= */
  const sunLottie = {
    v:"5.9.0", fr:30, ip:0, op:90, w:100, h:100, nm:"sun", ddd:0, assets:[],
    layers:[
      { ddd:0, ind:1, ty:4, nm:"rays", sr:1,
        ks:{
          o:{a:0,k:100},
          r:{a:1,k:[{t:0,s:[0]},{t:90,s:[360]}]},
          p:{a:0,k:[50,50,0]}, a:{a:0,k:[0,0,0]},
          s:{a:1,k:[{t:0,s:[92,92,100]},{t:45,s:[104,104,100]},{t:90,s:[92,92,100]}]}
        },
        shapes:[
          { ty:"gr", it:[
            { ty:"sr", sy:1, pt:{a:0,k:8}, p:{a:0,k:[0,0]}, r:{a:0,k:0}, ir:{a:0,k:16}, or:{a:0,k:38}, is:{a:0,k:0}, os:{a:0,k:0} },
            { ty:"fl", c:{a:0,k:[0.93,0.58,0.16,1]}, o:{a:0,k:90} },
            { ty:"tr", p:{a:0,k:[0,0]}, a:{a:0,k:[0,0]}, s:{a:0,k:[100,100]}, r:{a:0,k:0}, o:{a:0,k:100} }
          ]},
          { ty:"gr", it:[
            { ty:"el", p:{a:0,k:[0,0]}, s:{a:0,k:[36,36]} },
            { ty:"fl", c:{a:0,k:[0.97,0.72,0.32,1]}, o:{a:0,k:100} },
            { ty:"tr", p:{a:0,k:[0,0]}, a:{a:0,k:[0,0]}, s:{a:0,k:[100,100]}, r:{a:0,k:0}, o:{a:0,k:100} }
          ]}
        ], ip:0, op:90, st:0
      }
    ]
  };

  const moonLottie = {
    v:"5.9.0", fr:30, ip:0, op:120, w:100, h:100, nm:"moon", ddd:0, assets:[],
    layers:[
      { ddd:0, ind:1, ty:4, nm:"star1", sr:1,
        ks:{
          o:{a:1,k:[{t:0,s:[20]},{t:30,s:[90]},{t:60,s:[20]},{t:90,s:[90]},{t:120,s:[20]}]},
          r:{a:0,k:0}, p:{a:0,k:[74,26,0]}, a:{a:0,k:[0,0,0]}, s:{a:0,k:[100,100,100]}
        },
        shapes:[{ ty:"gr", it:[
          { ty:"sr", sy:1, pt:{a:0,k:4}, p:{a:0,k:[0,0]}, r:{a:0,k:0}, ir:{a:0,k:1.5}, or:{a:0,k:5}, is:{a:0,k:0}, os:{a:0,k:0} },
          { ty:"fl", c:{a:0,k:[1,1,0.92,1]}, o:{a:0,k:100} },
          { ty:"tr", p:{a:0,k:[0,0]}, a:{a:0,k:[0,0]}, s:{a:0,k:[100,100]}, r:{a:0,k:0}, o:{a:0,k:100} }
        ]}], ip:0, op:120, st:0
      },
      { ddd:0, ind:2, ty:4, nm:"star2", sr:1,
        ks:{
          o:{a:1,k:[{t:0,s:[90]},{t:30,s:[20]},{t:60,s:[90]},{t:90,s:[20]},{t:120,s:[90]}]},
          r:{a:0,k:0}, p:{a:0,k:[22,70,0]}, a:{a:0,k:[0,0,0]}, s:{a:0,k:[100,100,100]}
        },
        shapes:[{ ty:"gr", it:[
          { ty:"sr", sy:1, pt:{a:0,k:4}, p:{a:0,k:[0,0]}, r:{a:0,k:0}, ir:{a:0,k:1.2}, or:{a:0,k:4}, is:{a:0,k:0}, os:{a:0,k:0} },

          { ty:"tr", p:{a:0,k:[0,0]}, a:{a:0,k:[0,0]}, s:{a:0,k:[100,100]}, r:{a:0,k:0}, o:{a:0,k:100} }
        ]}], ip:0, op:120, st:0
      },
      { ddd:0, ind:3, ty:4, nm:"moonbody", sr:1,
        ks:{
          o:{a:0,k:100}, r:{a:0,k:0}, p:{a:0,k:[46,52,0]}, a:{a:0,k:[0,0,0]},
          s:{a:1,k:[{t:0,s:[100,100,100]},{t:60,s:[106,106,100]},{t:120,s:[100,100,100]}]}
        },
        shapes:[{ ty:"gr", it:[
          { ty:"el", p:{a:0,k:[0,0]}, s:{a:0,k:[52,52]} },
          { ty:"fl", c:{a:0,k:[0.36,0.4,0.75,1]}, o:{a:0,k:95} },
          { ty:"tr", p:{a:0,k:[0,0]}, a:{a:0,k:[0,0]}, s:{a:0,k:[100,100]}, r:{a:0,k:0}, o:{a:0,k:100} }
        ]}], ip:0, op:120, st:0
      }
    ]
  };

  const sunFallback = `<svg viewBox="0 0 24 24" fill="none" stroke="#e08a2b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
  const moonFallback = `<svg viewBox="0 0 24 24" fill="none" stroke="#5b62c9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

  const VIBE_LOTTIE_URLS = {
    today:    '', // 👉 paste a "lively / energetic" Lottie JSON URL here
    tomorrow: ''  // 👉 paste an "upcoming / anticipation" Lottie JSON URL here
  };

  const vibeLottieFallback = {
    today: {
      v:"5.9.0", fr:30, ip:0, op:60, w:60, h:60, nm:"vibe-today", ddd:0, assets:[],
      layers:[{ ddd:0, ind:1, ty:4, nm:"pulse", sr:1,
        ks:{
          o:{a:1,k:[{t:0,s:[70]},{t:15,s:[15]},{t:30,s:[70]},{t:45,s:[15]},{t:60,s:[70]}]},
          r:{a:0,k:0}, p:{a:0,k:[30,30,0]}, a:{a:0,k:[0,0,0]},
          s:{a:1,k:[{t:0,s:[80,80,100]},{t:15,s:[130,130,100]},{t:30,s:[80,80,100]},{t:45,s:[130,130,100]},{t:60,s:[80,80,100]}]}
        },
        shapes:[{ ty:"gr", it:[
          { ty:"el", p:{a:0,k:[0,0]}, s:{a:0,k:[26,26]} },
          { ty:"fl", c:{a:0,k:[1,0.55,0.4,1]}, o:{a:0,k:80} },
          { ty:"tr", p:{a:0,k:[0,0]}, a:{a:0,k:[0,0]}, s:{a:0,k:[100,100]}, r:{a:0,k:0}, o:{a:0,k:100} }
        ]}], ip:0, op:60, st:0
      }]
    },
    tomorrow: {
      v:"5.9.0", fr:30, ip:0, op:75, w:60, h:60, nm:"vibe-tomorrow", ddd:0, assets:[],
      layers:[{ ddd:0, ind:1, ty:4, nm:"rise", sr:1,
        ks:{
          o:{a:1,k:[{t:0,s:[0]},{t:20,s:[85]},{t:55,s:[85]},{t:75,s:[0]}]},
          r:{a:0,k:0}, p:{a:1,k:[{t:0,s:[30,44,0]},{t:75,s:[30,14,0]}]},
          a:{a:0,k:[0,0,0]}, s:{a:0,k:[100,100,100]}
        },
        shapes:[{ ty:"gr", it:[
          { ty:"sr", sy:1, pt:{a:0,k:3}, p:{a:0,k:[0,0]}, r:{a:0,k:180}, ir:{a:0,k:5}, or:{a:0,k:11}, is:{a:0,k:0}, os:{a:0,k:0} },
          { ty:"fl", c:{a:0,k:[0.55,0.68,1,1]}, o:{a:0,k:85} },
          { ty:"tr", p:{a:0,k:[0,0]}, a:{a:0,k:[0,0]}, s:{a:0,k:[100,100]}, r:{a:0,k:0}, o:{a:0,k:100} }
        ]}], ip:0, op:75, st:0
      }]
    }
  };

  function mountLottie(container, data){
    if(typeof lottie === 'undefined' || !container) return;
    try{ lottie.loadAnimation({ container, renderer:'svg', loop:true, autoplay:true, animationData:data }); }
    catch(e){}
  }
  function mountVibe(container, key){
    if(typeof lottie === 'undefined' || !container) return;
    const url = VIBE_LOTTIE_URLS[key];
    try{
      if(url) lottie.loadAnimation({ container, renderer:'svg', loop:true, autoplay:true, path:url });
      else lottie.loadAnimation({ container, renderer:'svg', loop:true, autoplay:true, animationData:vibeLottieFallback[key] });
    }catch(e){}
  }

  /* ================= Date formatting (real, not data) ================= */
  function formatDate(offset){
    const d = new Date();
    d.setDate(d.getDate() + offset);
    return d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
  }

  /* ================= Real KV-backed shift lookup ================= */
  const SHIFT_TYPES = {
    'Day Shift':   { time:'08:00 — 16:00', fallback:sunFallback,  data:sunLottie,  night:false },
    'Night Shift': { time:'20:00 — 04:00', fallback:moonFallback, data:moonLottie, night:true }
  };

  // Returns a display object for a known shift label, or null if the value
  // is missing/unrecognized — never guesses.
  function shiftInfoFromLabel(label){
    const known = SHIFT_TYPES[label];
    if(!known) return null;
    return { label, ...known };
  }

  async function fetchShiftData(retriesLeft = 1){
    const res = await fetch('/shift', { credentials: 'same-origin' });
    if(res.status === 401){
      // Don't trust a single 401 — could be a race with a token refresh,
      // a transient server hiccup, etc. Retry once before treating this
      // as a real logout.
      if(retriesLeft > 0){
        await new Promise(r => setTimeout(r, 400));
        return fetchShiftData(retriesLeft - 1);
      }
      window.location.href = '/login';
      return null;
    }
    if(!res.ok){
      let detail = '';
      try{ detail = (await res.json()).error || ''; }catch(e){}
      throw new Error(detail || `Request failed (${res.status})`);
    }
    return res.json(); // { id, today, tomorrow }
  }

  function populateCard(key, offset, shift){
    document.getElementById(`date-${key}`).textContent = formatDate(offset);
    if(!shift){
      document.getElementById(`name-${key}`).textContent = 'No schedule';
      document.getElementById(`time-${key}`).textContent = '—';
      document.getElementById(`icon-fallback-${key}`).innerHTML = '';
      return;
    }
    document.getElementById(`name-${key}`).textContent = shift.label;
    document.getElementById(`time-${key}`).textContent = shift.time;
    document.getElementById(`icon-${key}`).classList.toggle('night', shift.night);
    document.getElementById(`icon-fallback-${key}`).innerHTML = shift.fallback;
    mountLottie(document.getElementById(`icon-${key}`).querySelector('.icon-lottie'), shift.data);
    mountVibe(document.getElementById(`vibe-${key}`), key);
  }

  async function loadDashboard(){
    showLoading();
    try{
      // Header identity comes straight from cookies (id + name),
      // not from the server response.
      const cookieId = getCookie('id');
      const cookieName = getCookie('name');

      if(!cookieId || !cookieName){
        window.location.href = '/login';
        return;
      }
      renderUser(cookieId, cookieName);

      const data = await fetchShiftData();
      if(!data) return; // redirected to /login
      populateCard('today', 0, shiftInfoFromLabel(data.today));
      populateCard('tomorrow', 1, shiftInfoFromLabel(data.tomorrow));
      showPage();
    }catch(e){
      console.error('Dashboard load failed:', e);
      showError('Could not load your schedule. Check your connection and try again.');
    }
  }

  loadDashboard();

  /* ================= Logout ================= */
  document.getElementById('logoutBtn').addEventListener('click', () => {
    document.cookie = 'id=; Max-Age=0; path=/';
    document.cookie = 'name=; Max-Age=0; path=/';
    window.location.href = '/login';
  });

  /* ================= Slot rotation (2 fixed cards, never rebuilt) ================= */
  const EL = {
    today:    document.getElementById('card-today'),
    tomorrow: document.getElementById('card-tomorrow')
  };

  let slots = { front:'today', back:'tomorrow' };
  let isAnimating = false;

  const REST = {
    front:{ y:0,  scale:1,    opacity:1,   blur:0,  z:10 },
    back: { y:16, scale:0.93, opacity:0.55,blur:2,  z:9  }
  };

  function applyRest(el, slotName, withTransition){
    const r = REST[slotName];
    el.style.transition = withTransition
      ? 'transform .5s cubic-bezier(.22,.85,.32,1), opacity .5s ease, filter .5s ease'
      : 'none';
    el.style.transform = `translateY(${r.y}px) scale(${r.scale}) rotateX(0deg)`;
    el.style.opacity = r.opacity;
    el.style.filter = `blur(${r.blur}px)`;
    el.style.zIndex = r.z;
  }

  Object.keys(slots).forEach(slotName => applyRest(EL[slots[slotName]], slotName, false));

  const FLIP_MS = 460;

  function flip(direction){
    // direction: 1 = swipe up (reveal the other card from below), -1 = swipe down
    if(isAnimating) return;
    isAnimating = true;

    const outKey = slots.front, inKey = slots.back;
    const outEl = EL[outKey], inEl = EL[inKey];

    const flyY = direction === 1 ? -60 : 60;
    const rx = direction === 1 ? -100 : 100;

    outEl.style.transition = `transform ${FLIP_MS/2}ms ease-in, opacity ${FLIP_MS/2}ms ease, filter ${FLIP_MS/2}ms ease`;
    outEl.style.transform = `translateY(${flyY}px) scale(0.9) rotateX(${rx}deg)`;
    outEl.style.opacity = '0.12';
    outEl.style.zIndex = 11;

    applyRest(inEl, 'front', true);

    setTimeout(() => {
      outEl.style.transition = `transform ${FLIP_MS/2}ms ease-out, opacity ${FLIP_MS/2}ms ease, filter ${FLIP_MS/2}ms ease`;
      outEl.style.zIndex = REST.back.z;
      outEl.style.transform = `translateY(${REST.back.y}px) scale(${REST.back.scale}) rotateX(0deg)`;
      outEl.style.opacity = REST.back.opacity;
      outEl.style.filter = `blur(${REST.back.blur}px)`;
    }, FLIP_MS/2);

    setTimeout(() => {
      slots = { front:inKey, back:outKey };
      isAnimating = false;
    }, FLIP_MS);
  }

  const rotateUp = () => flip(1);
  const rotateDown = () => flip(-1);

  /* ================= Drag handling ================= */
  const stackEl = document.getElementById('cardStack');
  const COMMIT_THRESHOLD = 65;
  let startY = null, dragging = false, dragEl = null;

  function dragStart(y){
    if(isAnimating) return;
    dragEl = EL[slots.front];
    startY = y; dragging = true;
    dragEl.style.transition = 'none';
  }
  function dragMove(y){
    if(!dragging || startY === null || !dragEl) return;
    const delta = y - startY;
    dragEl.style.transform = `translateY(${delta * 0.8}px) rotate(${delta * 0.02}deg) scale(1)`;
  }
  function dragEnd(y){
    if(!dragging || startY === null || !dragEl) return;
    const delta = y - startY;
    dragging = false;
    const el = dragEl;
    dragEl = null; startY = null;
    if(Math.abs(delta) > COMMIT_THRESHOLD){
      delta < 0 ? rotateUp() : rotateDown();
    } else {
      applyRest(el, 'front', true);
    }
  }

  stackEl.addEventListener('mousedown', e => dragStart(e.clientY));
  window.addEventListener('mousemove', e => dragMove(e.clientY));
  window.addEventListener('mouseup', e => dragEnd(e.clientY));
  stackEl.addEventListener('touchstart', e => dragStart(e.touches[0].clientY), {passive:true});
  stackEl.addEventListener('touchmove', e => dragMove(e.touches[0].clientY), {passive:true});
  stackEl.addEventListener('touchend', e => dragEnd(e.changedTouches[0].clientY));

  let wheelLock = false;
  document.querySelector('.stack-wrap').addEventListener('wheel', e => {
    if(isAnimating || wheelLock) return;
    if(Math.abs(e.deltaY) < 25) return;
    wheelLock = true;
    e.deltaY > 0 ? rotateUp() : rotateDown();
    setTimeout(() => wheelLock = false, FLIP_MS + 100);
  }, {passive:true});

  document.addEventListener('keydown', e => {
    if(e.key === 'ArrowUp') rotateUp();
    if(e.key === 'ArrowDown') rotateDown();
  });

  document.getElementById('hintDown').addEventListener('click', rotateDown);
  document.getElementById('hintUp').addEventListener('click', rotateUp);


  /* ================= Button glow follow ================= */
  document.querySelectorAll('.action-btn').forEach(btn => {
    btn.addEventListener('mousemove', e => {
      const rect = btn.getBoundingClientRect();
      btn.style.setProperty('--x', `${e.clientX - rect.left}px`);
      btn.style.setProperty('--y', `${e.clientY - rect.top}px`);
    });
  });
</script>

</body>
</html>
