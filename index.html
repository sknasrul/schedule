<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Login</title>
  <link rel="manifest" href="manifest.json">
  <link rel="shortcut icon" href="assets/icon192.png" type="image/x-icon">
  <link rel="apple-touch-icon" href="assets/icon512.png">
  <link rel="prefetch" href="/home.html" as="document">
<style>
  *{
    -webkit-tap-highlight-color: transparent;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  .em{
    display: none;
  }
  form{
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    background-color: #fff;
  }
  h3{
    color: #5f6368;
    margin: 2rem;
  }
  .inp{
    position: relative;
    margin-bottom: 1rem;
  }
  input{
    width: 90vw;
    max-width: 350px;
    aspect-ratio: 5/1;
    border: 2px solid #dadce0;
    border-radius: 3rem;
    outline: none;
    font-size: 1.3rem;
    text-indent: 1.5rem;
  }
  input:focus{
    border-color: #4070F4;
  }
  label{
    position: absolute;
    pointer-events: none;
    top: 50%;
    left: 1.7rem;
    translate: 0 -50%;
    color: #5f6368;
    background-color: white;
    padding: .2rem;
    font-size: 1.3rem;
    transition: transform 0.2s ease, top 0.2s ease, font-size 0.2s ease, color 0.2s ease;
  }
  input:focus ~ label, input:not(:placeholder-shown) ~ label{
    top: 0;
    font-size: 1rem;
    font-weight: bold;
    color: #5f6368;
  }
  input:focus ~ label{
    color: #4070F4;
  }
  button{
    position: relative;
    font-size: 1.1rem;
    font-weight:bold;
    border: none;
    border-radius: 3rem;
    margin: 1rem 0;
    padding: 1rem 3rem;
    cursor: pointer;
    color: white;
    background: rgb(0, 100, 224);
  }
  .ripple{
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    background: rgba(255, 255, 255, 0.35);
    animation: expand-ripple 0.6s linear;
  }
  @keyframes expand-ripple{to{transform: scale(4);opacity: 0;}}
@media (min-width: 600px){
  section{
    display: flex;
    height: 80%;
    aspect-ratio: 1.5;
    border-radius: 3rem;
    overflow: hidden;
    position: fixed;
    top: 50%;
    left: 50%;
    translate: -50% -50%;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
  }
  .em{
    display: initial;
  }
}
</style>
</head>
<body>
  <section>
    <img src="assets/login.avif" alt="image" class="em">
    <form method="post" action="/logins">
      <h1>Welcome to Arcos</h1>
      <img src="assets/icon192.png" alt="logo" height="120">
      <h3>Please login to get started</h3>
      <div class="inp"><input placeholder="" name="id" required><label>Arcos ID</label></div>
      <div class="inp"><input placeholder="" name="name" required><label>Name</label></div>
      <button onclick="const r=this.getBoundingClientRect(),s=Math.max(r.width,r.height);this.querySelector('.ripple')?.remove();let p=document.createElement('span');p.className='ripple';p.style.cssText='width:'+s+'px;height:'+s+'px;left:'+(event.clientX-r.left-s/2)+'px;top:'+(event.clientY-r.top-s/2)+'px;';this.appendChild(p);">Login</button>
    </form>
  </section>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js');
  });
}
</script>
</body>
</html>
