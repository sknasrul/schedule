<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Schedules</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F7F5;
    --card:#FFFFFF;
    --ink:#1D1D1F;
    --sub:#6E6E73;
    --line:#E5E5E3;
    --present:#3B7A57;
    --shift:#2F6690;
    --weekoff:#B8860B;
    --absent:#B3261E;
    --training:#6750A4;
    --dl:#8C5A3C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
  }
  .wrap{
    max-width:720px;
    margin:0 auto;
    padding:24px 18px 60px;
  }
  header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-bottom:16px;
    margin-bottom:20px;
    border-bottom:1px solid var(--line);
  }
  header .name{
    font-size:18px;
    font-weight:600;
  }
  header .id{
    font-size:13px;
    color:var(--sub);
    font-weight:500;
  }
  h1{
    font-size:20px;
    font-weight:700;
    margin:0 0 14px;
  }
  #status-msg{
    font-size:14px;
    color:var(--sub);
    padding:30px 0;
  }
  .scroll{
    max-height:70vh;
    overflow-y:auto;
    overflow-x:hidden;
  }
  .day{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:8px;
  }
  .day .date{
    font-size:13px;
    color:var(--sub);
    font-weight:500;
  }
  .day .status{
    font-size:13px;
    font-weight:600;
  }
  .day.blank .status{color:var(--sub);font-weight:400;}
  .footer{
    margin-top:24px;
    font-size:12px;
    color:var(--sub);
    text-align:center;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="name" id="emp-name">—</div>
    <div class="id" id="emp-id">—</div>
  </header>

  <h1>My Schedules</h1>
  <div id="status-msg">Loading…</div>
  <div class="scroll" id="scroll" style="display:none;"></div>

  <div class="footer">This data is live from Google Sheets</div>
</div>

<script>
const SHEET_ID = "1OyX6V_7SGFBbTzL6vTpq4gj3PQ0Q5euPUsAYraxyY94";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

const STATUS_COLOR = {
  "Day Present": "var(--present)",
  "Day Shift":   "var(--shift)",
  "Week Off":    "var(--weekoff)",
  "Absent":      "var(--absent)",
  "Training":    "var(--training)",
  "DL":          "var(--dl)"
};

function getCookie(name){
  const match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([.$?*|{}()\[\]\\\/+^])/g,'\\$1') + '=([^;]*)'));
  return match ? decodeURIComponent(match[1]) : null;
}

function parseCSV(text){
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], next = text[i+1];
    if(inQuotes){
      if(c === '"' && next === '"'){ field += '"'; i++; }
      else if(c === '"'){ inQuotes = false; }
      else { field += c; }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field = ""; }
      else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
      else if(c === '\r'){ /* skip */ }
      else { field += c; }
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

function showMessage(msg){
  document.getElementById('status-msg').style.display = 'block';
  document.getElementById('status-msg').textContent = msg;
  document.getElementById('scroll').style.display = 'none';
}

function findEmployee(rows, targetId){
  const header = rows[0];
  const norm = s => (s || "").trim().toUpperCase();
  for(let i=1;i<rows.length;i++){
    if(norm(rows[i][0]) === norm(targetId)){
      return {header, row: rows[i]};
    }
  }
  return null;
}

function render(headerRow, empRow){
  document.getElementById('status-msg').style.display = 'none';
  document.getElementById('emp-id').textContent = empRow[0] || "—";
  document.getElementById('emp-name').textContent = empRow[1] || "—";

  const scroll = document.getElementById('scroll');
  scroll.innerHTML = "";
  scroll.style.display = 'block';

  for(let c = 2; c < headerRow.length; c++){
    const date = (headerRow[c] || "").trim();
    if(!date) continue;
    const val = (empRow[c] || "").trim();
    const day = document.createElement('div');
    day.className = 'day' + (val ? '' : ' blank');
    const color = STATUS_COLOR[val] || 'var(--ink)';
    day.innerHTML = `<div class="date">${date}</div><div class="status" style="color:${val ? color : ''}">${val || '—'}</div>`;
    scroll.appendChild(day);
  }
}

function lookup(id){
  if(!id){
    showMessage("No Arcos ID cookie found.");
    return;
  }
  fetch(CSV_URL)
    .then(res => {
      if(!res.ok) throw new Error("Sheet fetch failed: " + res.status);
      return res.text();
    })
    .then(text => {
      const rows = parseCSV(text);
      const found = findEmployee(rows, id);
      if(found){
        render(found.header, found.row);
      } else {
        showMessage(`No record found for "${id}".`);
      }
    })
    .catch(() => {
      showMessage("Couldn't load the schedule sheet.");
    });
}

lookup(getCookie('id'));
</script>
</body>
</html>
