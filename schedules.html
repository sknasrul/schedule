<script>
async function loadSchedule() {
  const container = document.getElementById('schedule-container');
  try {
    const res = await fetch('/api/schedule', { credentials: 'include' });
    if (res.status === 401) {
      window.location.href = '/login.html';
      return;
    }
    if (!res.ok) throw new Error('Failed to load schedule');

    const data = await res.json();
    renderSchedule(data);
  } catch (err) {
    container.innerHTML = `<p class="error">Could not load schedule. Please try again.</p>`;
  }
}

function renderSchedule(data) {
  const container = document.getElementById('schedule-container');
  const dates = Object.keys(data.schedule);

  container.innerHTML = `
    <h2>${data.name}</h2>
    <table class="schedule-table">
      <thead>
        <tr>${dates.map(d => `<th>${d}</th>`).join('')}</tr>
      </thead>
      <tbody>
        <tr>${dates.map(d => `<td>${data.schedule[d] || '-'}</td>`).join('')}</tr>
      </tbody>
    </table>
  `;
}

loadSchedule();
</script>
