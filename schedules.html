<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Schedules</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ==========================================================================
     Same design language as the dashboard (home.html): light glass panels
     floating over a softly-washed photo background, teal accent, amber used
     only for the "today" highlight. Fonts kept as Space Grotesk / IBM Plex
     Mono to match this page's own established convention.

     Page background base ......... #eef2f6
     Glass panel background ....... rgba(255,255,255,0.6)
     Glass panel border ........... rgba(15,23,42,0.10)
     Primary text .................. #1e293b
     Secondary / muted text ........ #64748b
     Accent (teal) .................. #0891b2 / #22d3ee
     Today accent (amber) .......... #c7912f
     ========================================================================== */
  :root{
    --ink:#1e293b;
    --ink-soft:#64748b;
    --card:rgba(255,255,255,0.6);
    --card-solid:#ffffff;
    --line:rgba(15,23,42,0.10);
    --teal:#0891b2;
    --teal-bright:#22d3ee;
    --amber:#c7912f;

    --present:#2F7A4F;   --present-bg:rgba(47,122,79,0.12);
    --shift:#2E6C9E;     --shift-bg:rgba(46,108,158,0.12);
    --weekoff:#B8860B;   --weekoff-bg:rgba(184,134,11,0.14);
    --absent:#B23A2E;    --absent-bg:rgba(178,58,46,0.12);
    --training:#6750A4;  --training-bg:rgba(103,80,164,0.12);
    --dl:#8C5A3C;        --dl-bg:rgba(140,90,60,0.12);
    --blank:#94a3b8;     --blank-bg:rgba(15,23,42,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    color:var(--ink);
    font-family:'Space Grotesk',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;

    background-image:
      linear-gradient(150deg, rgba(255,255,255,0.86) 0%, rgba(241,245,249,0.74) 45%, rgba(226,240,242,0.84) 100%),
      url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRsld00P-Uk05dRZhB_31vkySwWZDiXDKIODMK0wxEdMN_p26upEeBp7JY&s=10');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    background-color:#eef2f6;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:20px 16px 24px;
  }

  /* ---------- employee panel (glass, matches dashboard header) ---------- */
  .employee-panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:20px;
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    box-shadow:0 12px 30px rgba(15,23,42,0.10);
    display:flex;
    align-items:center;
    gap:14px;
    padding:16px 20px;
  }
  .avatar{
    width:48px;height:48px;border-radius:50%;
    background:linear-gradient(135deg, var(--teal-bright), var(--teal));
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:16px;color:#06232b;flex-shrink:0;
  }
  .emp-text{display:flex;flex-direction:column;gap:4px;min-width:0;}
  .emp-eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;letter-spacing:1.4px;text-transform:uppercase;
    color:var(--teal);font-weight:600;
  }
  .emp-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .name{font-size:19px;font-weight:700;letter-spacing:-0.1px;}
  .id{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;font-weight:500;color:var(--ink-soft);
    background:rgba(15,23,42,0.06);
    padding:3px 10px;border-radius:999px;white-space:nowrap;
  }

  /* ---------- section title ---------- */
  .section-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:26px 4px 12px;
  }
  .section-title h1{
    font-size:20px;
    font-weight:700;
    margin:0;
  }
  .count-pill{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:var(--ink-soft);
    background:var(--card);
    border:1px solid var(--line);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    padding:4px 11px;
    border-radius:20px;
  }

  /* ---------- status / loading ---------- */
  #status-msg{
    font-size:14px;
    color:var(--ink-soft);
    padding:36px 4px;
    text-align:center;
    background:var(--card);
    border-radius:16px;
    border:1px solid var(--line);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
  }
  .skeleton{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 16px;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
  }
  .skeleton .bar{
    height:12px;
    border-radius:6px;
    background:linear-gradient(90deg, var(--line) 25%, rgba(255,255,255,0.6) 37%, var(--line) 63%);
    background-size:400% 100%;
    animation:shimmer 1.3s ease infinite;
  }
  .skeleton .bar.a{width:70px;}
  .skeleton .bar.b{width:90px;}
  @keyframes shimmer{
    0%{background-position:100% 50%;}
    100%{background-position:0 50%;}
  }

  /* ---------- board ---------- */
  .board{
    max-height:62vh;
    overflow-y:auto;
    overflow-x:hidden;
    padding:2px;
    scrollbar-width:thin;
    scrollbar-color:rgba(15,23,42,0.2) transparent;
  }
  .board::-webkit-scrollbar{width:6px;}
  .board::-webkit-scrollbar-thumb{background:rgba(15,23,42,0.2);border-radius:10px;}

  .day{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px 20px;
    margin-bottom:10px;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .day:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 22px rgba(15,23,42,0.10);
  }
  .day.today{
    border-color:var(--amber);
    box-shadow:0 0 0 1.5px var(--amber) inset, 0 10px 22px rgba(199,145,47,0.14);
  }
  .day .date-block{
    display:flex;
    flex-direction:column;
  }
  .day .weekday{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.6px;
  }
  .day .date{
    font-family:'IBM Plex Mono',monospace;
    font-size:19px;
    font-weight:600;
    margin-top:2px;
  }
  .today-flag{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:1px;
    color:var(--amber);
    text-transform:uppercase;
    font-weight:600;
    margin-left:8px;
  }
  .status-pill{
    font-family:'IBM Plex Mono',monospace;
    font-size:14.5px;
    font-weight:600;
    padding:8px 16px;
    border-radius:22px;
    white-space:nowrap;
  }

  /* ---------- footer ---------- */
  .footer{
    margin-top:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
  }
  .live-dot{
    width:7px;height:7px;
    border-radius:50%;
    background:var(--present);
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(47,122,79,0.35);}
    50%{box-shadow:0 0 0 5px rgba(47,122,79,0);}
  }

  @media (max-width:420px){
    .name{font-size:17px;}
    .board{max-height:58vh;}
  }
  @media (min-width:720px){
    .wrap{max-width:600px;padding-top:48px;}
    .board{max-height:66vh;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="employee-panel">
    <div class="avatar" id="avatarInitials">--</div>
    <div class="emp-text">
      <span class="emp-eyebrow">Employee</span>
      <div class="emp-row">
        <span class="name" id="emp-name">—</span>
        <span class="id" id="emp-id">—</span>
      </div>
    </div>
  </div>

  <div class="section-title">
    <h1>My Schedules</h1>
    <span class="count-pill" id="count-pill" style="display:none;"></span>
  </div>

  <div id="status-msg">Loading your schedule…</div>

  <div class="board-frame" id="board-frame" style="display:none;">
    <div class="board" id="board"></div>
  </div>

  <div class="footer"><span class="live-dot"></span>This data is live from Google Sheets</div>
</div>

<script>
const SHEET_ID = "1OyX6V_7SGFBbTzL6vTpq4gj3PQ0Q5euPUsAYraxyY94";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

const STATUS_STYLE = {
  "Day Present": {fg:"var(--present)",  bg:"var(--present-bg)"},
  "Day Shift":   {fg:"var(--shift)",    bg:"var(--shift-bg)"},
  "Week Off":    {fg:"var(--weekoff)",  bg:"var(--weekoff-bg)"},
  "Absent":      {fg:"var(--absent)",   bg:"var(--absent-bg)"},
  "Training":    {fg:"var(--training)", bg:"var(--training-bg)"},
  "DL":          {fg:"var(--dl)",       bg:"var(--dl-bg)"}
};

function getCookie(name){
  const match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([.$?*|{}()\[\]\\\/+^])/g,'\\$1') + '=([^;]*)'));
  return match ? decodeURIComponent(match[1]) : null;
}

function parseCSV(text){
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], next = text[i+1];
    if(inQuotes){
      if(c === '"' && next === '"'){ field += '"'; i++; }
      else if(c === '"'){ inQuotes = false; }
      else { field += c; }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field = ""; }
      else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
      else if(c === '\r'){ /* skip */ }
      else { field += c; }
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

function showMessage(msg){
  document.getElementById('status-msg').style.display = 'block';
  document.getElementById('status-msg').textContent = msg;
  document.getElementById('board-frame').style.display = 'none';
  document.getElementById('count-pill').style.display = 'none';
}

function showSkeleton(){
  const msg = document.getElementById('status-msg');
  msg.style.display = 'none';
  const frame = document.getElementById('board-frame');
  const board = document.getElementById('board');
  frame.style.display = 'block';
  board.innerHTML = "";
  for(let i=0;i<6;i++){
    const sk = document.createElement('div');
    sk.className = 'skeleton';
    sk.innerHTML = '<div class="bar a"></div><div class="bar b"></div>';
    board.appendChild(sk);
  }
}

function findEmployee(rows, targetId){
  const header = rows[0];
  const norm = s => (s || "").trim().toUpperCase();
  for(let i=1;i<rows.length;i++){
    if(norm(rows[i][0]) === norm(targetId)){
      return {header, row: rows[i]};
    }
  }
  return null;
}

function parseHeaderDate(label){
  // label like "12-Jun" -> guess a Date in the current year
  const m = label.match(/^(\d{1,2})-([A-Za-z]{3})$/);
  if(!m) return null;
  const year = new Date().getFullYear();
  const d = new Date(`${m[2]} ${m[1]}, ${year}`);
  return isNaN(d) ? null : d;
}

function isSameDay(a, b){
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function setAvatarInitials(name){
  const initials = (name || "")
    .split(' ')
    .filter(Boolean)
    .map(w => w[0])
    .join('')
    .slice(0,2)
    .toUpperCase();
  document.getElementById('avatarInitials').textContent = initials || "--";
}

function render(headerRow, empRow){
  document.getElementById('status-msg').style.display = 'none';
  document.getElementById('emp-id').textContent = empRow[0] || "—";
  document.getElementById('emp-name').textContent = empRow[1] || "—";
  setAvatarInitials(empRow[1]);

  const frame = document.getElementById('board-frame');
  const board = document.getElementById('board');
  const countPill = document.getElementById('count-pill');
  board.innerHTML = "";
  frame.style.display = 'block';

  const today = new Date();
  const weekdayFmt = new Intl.DateTimeFormat('en-US', {weekday:'short'});
  let logged = 0;

  for(let c = 2; c < headerRow.length; c++){
    const label = (headerRow[c] || "").trim();
    if(!label) continue;
    const val = (empRow[c] || "").trim();
    if(val) logged++;

    const dateObj = parseHeaderDate(label);
    const weekday = dateObj ? weekdayFmt.format(dateObj) : "";
    const todayFlag = dateObj && isSameDay(dateObj, today);

    const row = document.createElement('div');
    row.className = 'day' + (todayFlag ? ' today' : '');

    const style = STATUS_STYLE[val];
    const pillHtml = val
      ? `<span class="status-pill" style="color:${style ? style.fg : 'var(--ink-soft)'};background:${style ? style.bg : 'var(--blank-bg)'}">${val}</span>`
      : `<span class="status-pill" style="color:var(--blank);background:var(--blank-bg)">Not scheduled</span>`;

    row.innerHTML = `
      <div class="date-block">
        <div class="weekday">${weekday}${todayFlag ? '<span class="today-flag">Today</span>' : ''}</div>
        <div class="date">${label}</div>
      </div>
      ${pillHtml}
    `;
    board.appendChild(row);
  }

  countPill.textContent = `${logged} logged`;
  countPill.style.display = 'inline-block';
}

function lookup(id){
  if(!id){
    showMessage("No Arcos ID cookie found.");
    return;
  }
  showSkeleton();
  fetch(CSV_URL)
    .then(res => {
      if(!res.ok) throw new Error("Sheet fetch failed: " + res.status);
      return res.text();
    })
    .then(text => {
      const rows = parseCSV(text);
      const found = findEmployee(rows, id);
      if(found){
        render(found.header, found.row);
      } else {
        showMessage(`No record found for "${id}".`);
      }
    })
    .catch(() => {
      showMessage("Couldn't load the schedule sheet.");
    });
}

lookup(getCookie('id'));
</script>
</body>
</html>
