<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duty Manifest — Lifetime Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EDE9DD;
    --paper-dark:#E2DDCC;
    --ink:#1B1B1B;
    --safety:#F5B400;
    --rust:#B23A2E;
    --steel:#3A5A78;
    --moss:#55684B;
    --plum:#6B4E71;
    --clay:#8C5A3C;
    --void:#C9C2AE;
    --line:#B9B19A;
    --paper-hole:#00000000;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;
    min-height:100vh;
  }
  body{
    background-image:
      radial-gradient(circle at 4px 4px, rgba(0,0,0,0.05) 1px, transparent 1.2px);
    background-size:14px 14px;
  }
  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:28px 20px 80px;
  }

  /* ---------- Hazard header ---------- */
  .hazard-bar{
    height:14px;
    width:100%;
    background:repeating-linear-gradient(135deg, var(--safety) 0 18px, var(--ink) 18px 36px);
    border-radius:3px 3px 0 0;
  }
  header.manifest-head{
    background:var(--ink);
    color:var(--paper);
    padding:22px 26px 18px;
    border-radius:0 0 3px 3px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:10px;
  }
  header.manifest-head .title{
    font-family:'Bebas Neue',sans-serif;
    font-size:42px;
    letter-spacing:2px;
    line-height:0.9;
  }
  header.manifest-head .sub{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:2px;
    color:var(--safety);
    text-transform:uppercase;
    margin-top:6px;
  }
  header.manifest-head .doc-no{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--void);
    text-align:right;
  }

  /* ---------- ID card ---------- */
  .id-card{
    margin-top:22px;
    background:var(--paper-dark);
    border:1px solid var(--line);
    border-left:8px solid var(--safety);
    border-radius:2px;
    padding:20px 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:16px;
    position:relative;
  }
  .id-card .field-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:#6b6455;
    margin-bottom:3px;
  }
  .id-card .field-value{
    font-family:'Bebas Neue',sans-serif;
    font-size:26px;
    letter-spacing:1px;
  }
  .id-card .arcos-id{
    font-family:'IBM Plex Mono',monospace;
    font-size:22px;
    font-weight:600;
    letter-spacing:1px;
    background:var(--ink);
    color:var(--safety);
    padding:6px 12px;
    border-radius:3px;
  }
  .stamp{
    font-family:'Bebas Neue',sans-serif;
    font-size:13px;
    letter-spacing:3px;
    border:3px solid var(--rust);
    color:var(--rust);
    padding:5px 12px;
    border-radius:6px;
    transform:rotate(-4deg);
    text-transform:uppercase;
    opacity:0.85;
    white-space:nowrap;
  }
  .stamp.ok{border-color:var(--moss);color:var(--moss);}

  /* ---------- status states ---------- */
  #status-msg{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:#6b6455;
    padding:40px 10px;
    text-align:center;
  }
  /* ---------- tally counters ---------- */
  .tally-section{margin-top:34px;}
  .section-eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#6b6455;
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
  }
  .section-eyebrow::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }
  .tally-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
  }
  .tally-card{
    background:var(--paper-dark);
    border:1px solid var(--line);
    border-radius:3px;
    padding:14px 16px;
    position:relative;
    overflow:hidden;
  }
  .tally-card .bar{
    position:absolute;
    left:0;bottom:0;
    height:4px;
    width:100%;
    transform-origin:left;
  }
  .tally-card .count{
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    font-size:34px;
    line-height:1;
    letter-spacing:-1px;
  }
  .tally-card .label{
    margin-top:6px;
    font-size:12.5px;
    color:#4a4436;
    font-weight:500;
  }
  .tally-card.total{
    background:var(--ink);
    color:var(--paper);
  }
  .tally-card.total .label{color:var(--void);}
  .tally-card.total .count{color:var(--safety);}

  /* ---------- timeline strip ---------- */
  .timeline-section{margin-top:36px;}
  .timeline-scroll{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding:14px 4px 18px;
    background:var(--paper-dark);
    border:1px solid var(--line);
    border-radius:3px;
    position:relative;
  }
  .timeline-scroll::before,.timeline-scroll::after{
    content:"";
    position:absolute;
    top:0;bottom:0;
    width:14px;
    background-image:radial-gradient(circle, var(--paper) 3px, transparent 3.2px);
    background-size:14px 16px;
    background-repeat:repeat-y;
  }
  .timeline-scroll::before{left:0;}
  .timeline-scroll::after{right:0;}
  .day-chip{
    flex:0 0 auto;
    width:64px;
    text-align:center;
    padding:8px 4px 10px;
    border-radius:3px;
    color:var(--paper);
  }
  .day-chip .date{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    opacity:0.85;
  }
  .day-chip .status{
    font-family:'Bebas Neue',sans-serif;
    font-size:12px;
    letter-spacing:0.5px;
    margin-top:4px;
    line-height:1.1;
  }
  .day-chip.blank{
    background:transparent;
    border:1px dashed var(--line);
    color:#a29c8a;
  }

  /* ---------- legend ---------- */
  .legend{
    margin-top:14px;
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:#4a4436;
  }
  .legend span.dot{
    display:inline-block;
    width:10px;height:10px;
    border-radius:2px;
    margin-right:6px;
    vertical-align:middle;
  }

  footer{
    margin-top:40px;
    text-align:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:#8a8371;
    letter-spacing:0.5px;
  }

  @media (max-width:520px){
    header.manifest-head .title{font-size:32px;}
    .id-card .arcos-id{font-size:18px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="hazard-bar"></div>
  <header class="manifest-head">
    <div>
      <div class="title">Duty Manifest</div>
      <div class="sub">Lifetime Schedule Record</div>
    </div>
    <div class="doc-no" id="doc-no">FORM ARC-LS · —</div>
  </header>

  <div class="id-card" id="id-card" style="display:none;">
    <div>
      <div class="field-label">Employee</div>
      <div class="field-value" id="emp-name">—</div>
    </div>
    <div>
      <div class="field-label">Arcos ID</div>
      <div class="arcos-id" id="emp-id">—</div>
    </div>
    <div class="stamp ok" id="emp-stamp">On File</div>
  </div>

  <div id="status-msg">Reading duty roster…</div>

  <div id="content" style="display:none;">
    <div class="tally-section">
      <div class="section-eyebrow">Lifetime Tally</div>
      <div class="tally-grid" id="tally-grid"></div>
    </div>

    <div class="timeline-section">
      <div class="section-eyebrow">Day-by-Day Record</div>
      <div class="timeline-scroll" id="timeline"></div>
      <div class="legend" id="legend"></div>
    </div>
  </div>

  <footer>Data sourced live from the duty roster sheet · Arcos ID read from your session cookie</footer>
</div>

<script>
const SHEET_ID = "1OyX6V_7SGFBbTzL6vTpq4gj3PQ0Q5euPUsAYraxyY94";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

const STATUS_STYLE = {
  "Day Present": {color:"var(--moss)",  short:"Present"},
  "Day Shift":   {color:"var(--steel)", short:"Shift"},
  "Week Off":    {color:"var(--safety)",short:"Week Off", dark:true},
  "Absent":      {color:"var(--rust)",  short:"Absent"},
  "Training":    {color:"var(--plum)",  short:"Training"},
  "DL":          {color:"var(--clay)",  short:"DL"}
};

function getCookie(name){
  const match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([.$?*|{}()\[\]\\\/+^])/g,'\\$1') + '=([^;]*)'));
  return match ? decodeURIComponent(match[1]) : null;
}

function parseCSV(text){
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], next = text[i+1];
    if(inQuotes){
      if(c === '"' && next === '"'){ field += '"'; i++; }
      else if(c === '"'){ inQuotes = false; }
      else { field += c; }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field = ""; }
      else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
      else if(c === '\r'){ /* skip */ }
      else { field += c; }
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

function animateCount(el, target, duration=900){
  const start = performance.now();
  function tick(now){
    const p = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1-p, 3);
    el.textContent = Math.round(eased * target);
    if(p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function showMessage(msg){
  document.getElementById('status-msg').style.display = 'block';
  document.getElementById('status-msg').textContent = msg;
}

function render(headerRow, empRow){
  document.getElementById('status-msg').style.display = 'none';
  document.getElementById('id-card').style.display = 'flex';
  document.getElementById('content').style.display = 'block';

  const arcosId = empRow[0] || "—";
  const name = empRow[1] || "—";
  document.getElementById('emp-id').textContent = arcosId;
  document.getElementById('emp-name').textContent = name;
  document.getElementById('doc-no').textContent = `FORM ARC-LS · ${arcosId}`;

  const counts = {};
  let dayCells = [];
  for(let c = 2; c < headerRow.length; c++){
    const dateLabel = (headerRow[c] || "").trim();
    const val = (empRow[c] || "").trim();
    if(!dateLabel) continue;
    if(val){ counts[val] = (counts[val] || 0) + 1; }
    dayCells.push({date: dateLabel, val});
  }

  const totalMarked = dayCells.filter(d => d.val).length;

  // Tally cards
  const grid = document.getElementById('tally-grid');
  grid.innerHTML = "";
  const order = ["Day Present","Day Shift","Week Off","Absent","Training","DL"];
  const seen = new Set();
  order.concat(Object.keys(counts)).forEach(key => {
    if(seen.has(key) || !(key in counts)) return;
    seen.add(key);
    const style = STATUS_STYLE[key] || {color:"var(--line)", short:key};
    const card = document.createElement('div');
    card.className = 'tally-card';
    card.innerHTML = `<div class="count">0</div><div class="label">${style.short}</div><div class="bar" style="background:${style.color}"></div>`;
    grid.appendChild(card);
    animateCount(card.querySelector('.count'), counts[key]);
  });
  const totalCard = document.createElement('div');
  totalCard.className = 'tally-card total';
  totalCard.innerHTML = `<div class="count">0</div><div class="label">Total Days Logged</div>`;
  grid.appendChild(totalCard);
  animateCount(totalCard.querySelector('.count'), totalMarked);

  // Timeline
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = "";
  dayCells.forEach(d => {
    const chip = document.createElement('div');
    if(d.val){
      const style = STATUS_STYLE[d.val] || {color:"var(--void)", short:d.val, dark:true};
      chip.className = 'day-chip';
      chip.style.background = style.color;
      if(style.dark) chip.style.color = "var(--ink)";
      chip.innerHTML = `<div class="date">${d.date}</div><div class="status">${style.short}</div>`;
    } else {
      chip.className = 'day-chip blank';
      chip.innerHTML = `<div class="date">${d.date}</div><div class="status">—</div>`;
    }
    timeline.appendChild(chip);
  });

  // Legend
  const legend = document.getElementById('legend');
  legend.innerHTML = "";
  order.forEach(key => {
    if(!(key in counts)) return;
    const style = STATUS_STYLE[key];
    const item = document.createElement('span');
    item.innerHTML = `<span class="dot" style="background:${style.color}"></span>${style.short}`;
    legend.appendChild(item);
  });
}

function findEmployee(rows, targetId){
  const header = rows[0];
  const norm = s => (s || "").trim().toUpperCase();
  for(let i=1;i<rows.length;i++){
    if(norm(rows[i][0]) === norm(targetId)){
      return {header, row: rows[i]};
    }
  }
  return null;
}

let allRows = null;

function lookup(id){
  if(!id){
    showMessage("No Arcos ID cookie found. This page expects an 'id' cookie (e.g. id=ARL19786).");
    return;
  }
  showMessage("Reading duty roster…");
  document.getElementById('id-card').style.display = 'none';
  document.getElementById('content').style.display = 'none';

  const proceed = (rows) => {
    allRows = rows;
    const found = findEmployee(rows, id);
    if(found){
      render(found.header, found.row);
    } else {
      showMessage(`No manifest found for "${id}".`);
    }
  };

  if(allRows){ proceed(allRows); return; }

  fetch(CSV_URL)
    .then(res => {
      if(!res.ok) throw new Error("Sheet fetch failed: " + res.status);
      return res.text();
    })
    .then(text => proceed(parseCSV(text)))
    .catch(err => {
      showMessage("Couldn't reach the duty roster sheet. Confirm it's shared as 'Anyone with the link can view'.");
      console.error(err);
    });
}

// Entry point: read the Arcos ID straight from the cookie
lookup(getCookie('id'));
</script>
</body>
</html>
