<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Schedules</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF0EA;
    --ink:#1B2430;
    --ink-soft:#4B5563;
    --card:#FFFFFF;
    --line:#E2E4DC;
    --amber:#C7912F;
    --present:#2F7A4F;
    --present-bg:#E7F3EB;
    --shift:#2E6C9E;
    --shift-bg:#E7F0F8;
    --weekoff:#B8860B;
    --weekoff-bg:#FBF1DD;
    --absent:#B23A2E;
    --absent-bg:#FAEAE8;
    --training:#6750A4;
    --training-bg:#EFEAF7;
    --dl:#8C5A3C;
    --dl-bg:#F5EAE2;
    --blank:#9AA0A6;
    --blank-bg:#F1F2EF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Space Grotesk',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:20px 16px 48px;
  }

  /* ---------- ticket header ---------- */
  .ticket{
    background:var(--card);
    border-radius:16px;
    box-shadow:0 1px 2px rgba(27,36,48,0.04), 0 8px 24px rgba(27,36,48,0.06);
    position:relative;
    overflow:visible;
    padding:22px 22px 18px;
  }
  .ticket::before, .ticket::after{
    content:"";
    position:absolute;
    bottom:-10px;
    width:20px;height:20px;
    background:var(--bg);
    border-radius:50%;
  }
  .ticket::before{left:-10px;}
  .ticket::after{right:-10px;}
  .ticket .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:1.6px;
    text-transform:uppercase;
    color:var(--amber);
    font-weight:600;
  }
  .ticket .row{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-top:8px;
    gap:10px;
    flex-wrap:wrap;
  }
  .ticket .name{
    font-size:22px;
    font-weight:700;
    letter-spacing:-0.2px;
  }
  .ticket .id{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    font-weight:500;
    color:var(--ink-soft);
    background:var(--bg);
    padding:5px 10px;
    border-radius:8px;
    white-space:nowrap;
  }
  .ticket .stub-divider{
    margin-top:16px;
    border-top:1.5px dashed var(--line);
  }

  /* ---------- section title ---------- */
  .section-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:26px 4px 12px;
  }
  .section-title h1{
    font-size:17px;
    font-weight:700;
    margin:0;
  }
  .count-pill{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    background:var(--card);
    border:1px solid var(--line);
    padding:3px 9px;
    border-radius:20px;
  }

  /* ---------- status / loading ---------- */
  #status-msg{
    font-size:14px;
    color:var(--ink-soft);
    padding:36px 4px;
    text-align:center;
    background:var(--card);
    border-radius:14px;
    border:1px solid var(--line);
  }
  .skeleton{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .skeleton .bar{
    height:12px;
    border-radius:6px;
    background:linear-gradient(90deg, var(--line) 25%, #eceee6 37%, var(--line) 63%);
    background-size:400% 100%;
    animation:shimmer 1.3s ease infinite;
  }
  .skeleton .bar.a{width:70px;}
  .skeleton .bar.b{width:90px;}
  @keyframes shimmer{
    0%{background-position:100% 50%;}
    100%{background-position:0 50%;}
  }

  /* ---------- board ---------- */
  .board-frame{
    position:relative;
  }
  .board-frame::before, .board-frame::after{
    content:"";
    position:absolute;
    left:0;right:0;
    height:18px;
    pointer-events:none;
    z-index:2;
  }
  .board-frame::before{
    top:0;
    background:linear-gradient(var(--bg), rgba(238,240,234,0));
  }
  .board-frame::after{
    bottom:0;
    background:linear-gradient(rgba(238,240,234,0), var(--bg));
  }
  .board{
    max-height:62vh;
    overflow-y:auto;
    overflow-x:hidden;
    padding:2px;
    scrollbar-width:thin;
    scrollbar-color:#c9ccc0 transparent;
  }
  .board::-webkit-scrollbar{width:6px;}
  .board::-webkit-scrollbar-thumb{background:#c9ccc0;border-radius:10px;}

  .day{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:13px 16px;
    margin-bottom:8px;
    transition:transform 0.12s ease, box-shadow 0.12s ease;
  }
  .day.today{
    border-color:var(--amber);
    box-shadow:0 0 0 1px var(--amber) inset;
  }
  .day .date-block{
    display:flex;
    flex-direction:column;
  }
  .day .weekday{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.6px;
  }
  .day .date{
    font-family:'IBM Plex Mono',monospace;
    font-size:15px;
    font-weight:600;
    margin-top:1px;
  }
  .today-flag{
    font-family:'IBM Plex Mono',monospace;
    font-size:9.5px;
    letter-spacing:1px;
    color:var(--amber);
    text-transform:uppercase;
    font-weight:600;
    margin-left:8px;
  }
  .status-pill{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    font-weight:600;
    padding:6px 12px;
    border-radius:20px;
    white-space:nowrap;
  }

  /* ---------- footer ---------- */
  .footer{
    margin-top:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--ink-soft);
  }
  .live-dot{
    width:7px;height:7px;
    border-radius:50%;
    background:var(--present);
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(47,122,79,0.35);}
    50%{box-shadow:0 0 0 5px rgba(47,122,79,0);}
  }

  @media (max-width:420px){
    .ticket .name{font-size:19px;}
    .board{max-height:58vh;}
  }
  @media (min-width:720px){
    .wrap{max-width:600px;padding-top:48px;}
    .board{max-height:66vh;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="ticket">
    <div class="eyebrow">Employee</div>
    <div class="row">
      <div class="name" id="emp-name">—</div>
      <div class="id" id="emp-id">—</div>
    </div>
    <div class="stub-divider"></div>
  </div>

  <div class="section-title">
    <h1>My Schedules</h1>
    <span class="count-pill" id="count-pill" style="display:none;"></span>
  </div>

  <div id="status-msg">Loading your schedule…</div>

  <div class="board-frame" id="board-frame" style="display:none;">
    <div class="board" id="board"></div>
  </div>

  <div class="footer"><span class="live-dot"></span>This data is live from Google Sheets</div>
</div>

<script>
const SHEET_ID = "1OyX6V_7SGFBbTzL6vTpq4gj3PQ0Q5euPUsAYraxyY94";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

const STATUS_STYLE = {
  "Day Present": {fg:"var(--present)",  bg:"var(--present-bg)"},
  "Day Shift":   {fg:"var(--shift)",    bg:"var(--shift-bg)"},
  "Week Off":    {fg:"var(--weekoff)",  bg:"var(--weekoff-bg)"},
  "Absent":      {fg:"var(--absent)",   bg:"var(--absent-bg)"},
  "Training":    {fg:"var(--training)", bg:"var(--training-bg)"},
  "DL":          {fg:"var(--dl)",       bg:"var(--dl-bg)"}
};

function getCookie(name){
  const match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([.$?*|{}()\[\]\\\/+^])/g,'\\$1') + '=([^;]*)'));
  return match ? decodeURIComponent(match[1]) : null;
}

function parseCSV(text){
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], next = text[i+1];
    if(inQuotes){
      if(c === '"' && next === '"'){ field += '"'; i++; }
      else if(c === '"'){ inQuotes = false; }
      else { field += c; }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field = ""; }
      else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
      else if(c === '\r'){ /* skip */ }
      else { field += c; }
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

function showMessage(msg){
  document.getElementById('status-msg').style.display = 'block';
  document.getElementById('status-msg').textContent = msg;
  document.getElementById('board-frame').style.display = 'none';
  document.getElementById('count-pill').style.display = 'none';
}

function showSkeleton(){
  const msg = document.getElementById('status-msg');
  msg.style.display = 'none';
  const frame = document.getElementById('board-frame');
  const board = document.getElementById('board');
  frame.style.display = 'block';
  board.innerHTML = "";
  for(let i=0;i<6;i++){
    const sk = document.createElement('div');
    sk.className = 'skeleton';
    sk.innerHTML = '<div class="bar a"></div><div class="bar b"></div>';
    board.appendChild(sk);
  }
}

function findEmployee(rows, targetId){
  const header = rows[0];
  const norm = s => (s || "").trim().toUpperCase();
  for(let i=1;i<rows.length;i++){
    if(norm(rows[i][0]) === norm(targetId)){
      return {header, row: rows[i]};
    }
  }
  return null;
}

function parseHeaderDate(label){
  // label like "12-Jun" -> guess a Date in the current year
  const m = label.match(/^(\d{1,2})-([A-Za-z]{3})$/);
  if(!m) return null;
  const year = new Date().getFullYear();
  const d = new Date(`${m[2]} ${m[1]}, ${year}`);
  return isNaN(d) ? null : d;
}

function isSameDay(a, b){
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function render(headerRow, empRow){
  document.getElementById('status-msg').style.display = 'none';
  document.getElementById('emp-id').textContent = empRow[0] || "—";
  document.getElementById('emp-name').textContent = empRow[1] || "—";

  const frame = document.getElementById('board-frame');
  const board = document.getElementById('board');
  const countPill = document.getElementById('count-pill');
  board.innerHTML = "";
  frame.style.display = 'block';

  const today = new Date();
  const weekdayFmt = new Intl.DateTimeFormat('en-US', {weekday:'short'});
  let logged = 0;

  for(let c = 2; c < headerRow.length; c++){
    const label = (headerRow[c] || "").trim();
    if(!label) continue;
    const val = (empRow[c] || "").trim();
    if(val) logged++;

    const dateObj = parseHeaderDate(label);
    const weekday = dateObj ? weekdayFmt.format(dateObj) : "";
    const todayFlag = dateObj && isSameDay(dateObj, today);

    const row = document.createElement('div');
    row.className = 'day' + (todayFlag ? ' today' : '');

    const style = STATUS_STYLE[val];
    const pillHtml = val
      ? `<span class="status-pill" style="color:${style ? style.fg : 'var(--ink-soft)'};background:${style ? style.bg : 'var(--blank-bg)'}">${val}</span>`
      : `<span class="status-pill" style="color:var(--blank);background:var(--blank-bg)">Not scheduled</span>`;

    row.innerHTML = `
      <div class="date-block">
        <div class="weekday">${weekday}${todayFlag ? '<span class="today-flag">Today</span>' : ''}</div>
        <div class="date">${label}</div>
      </div>
      ${pillHtml}
    `;
    board.appendChild(row);
  }

  countPill.textContent = `${logged} logged`;
  countPill.style.display = 'inline-block';
}

function lookup(id){
  if(!id){
    showMessage("No Arcos ID cookie found.");
    return;
  }
  showSkeleton();
  fetch(CSV_URL)
    .then(res => {
      if(!res.ok) throw new Error("Sheet fetch failed: " + res.status);
      return res.text();
    })
    .then(text => {
      const rows = parseCSV(text);
      const found = findEmployee(rows, id);
      if(found){
        render(found.header, found.row);
      } else {
        showMessage(`No record found for "${id}".`);
      }
    })
    .catch(() => {
      showMessage("Couldn't load the schedule sheet.");
    });
}

lookup(getCookie('id'));
</script>
</body>
</html>
