<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .header {
      max-width: 900px;
      margin: 0 auto 1.5rem;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .header p {
      font-size: 14px;
      color: #6b6b68;
      margin-top: 4px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      max-width: 900px;
      margin: 0 auto 1.5rem;
    }

    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      border: 0.5px solid #ddddd8;
    }

    .stat-card .label {
      font-size: 12px;
      color: #6b6b68;
      margin-bottom: 6px;
    }

    .stat-card .value {
      font-size: 24px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .stat-card .value.green { color: #1D9E75; }
    .stat-card .value.red   { color: #E24B4A; }

    .table-wrapper {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      border: 0.5px solid #ddddd8;
      overflow: hidden;
    }

    .table-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 0.5px solid #ddddd8;
    }

    .table-toolbar span {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .refresh-btn {
      font-size: 13px;
      color: #6b6b68;
      background: none;
      border: 0.5px solid #ddddd8;
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .refresh-btn:hover { background: #f4f4f0; }

    .scroll-x { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: auto;
    }

    th {
      background: #f9f9f7;
      font-weight: 500;
      color: #6b6b68;
      text-align: left;
      padding: 10px 14px;
      border-bottom: 0.5px solid #ddddd8;
      white-space: nowrap;
    }

    td {
      padding: 10px 14px;
      border-bottom: 0.5px solid #f0f0ec;
      color: #1a1a1a;
      white-space: nowrap;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9f9f7; }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .badge.present {
      background: #E1F5EE;
      color: #085041;
    }

    .badge.absent {
      background: #FCEBEB;
      color: #791F1F;
    }

    .badge.na {
      background: #f1efe8;
      color: #5f5e5a;
    }

    .loading, .error {
      text-align: center;
      padding: 3rem;
      font-size: 14px;
      color: #6b6b68;
    }

    .error { color: #E24B4A; }

    @media (max-width: 600px) {
      body { padding: 1rem 0.75rem; }
      .header h1 { font-size: 18px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Attendance tracker</h1>
  <p id="subtitle">Loading data...</p>
</div>

<div class="stats" id="stats"></div>

<div class="table-wrapper">
  <div class="table-toolbar">
    <span>All records</span>
    <button class="refresh-btn" onclick="loadData()">&#8635; Refresh</button>
  </div>
  <div class="scroll-x">
    <div id="table-area"><div class="loading">Loading...</div></div>
  </div>
</div>

<script>
  let dateCols = [];

  async function loadData() {
    document.getElementById("table-area").innerHTML = '<div class="loading">Loading...</div>';
    document.getElementById("stats").innerHTML = "";
    document.getElementById("subtitle").textContent = "Loading data...";

    try {
      const res = await fetch("/sheet");
      const { cols, rows, error } = await res.json();

      if (error) throw new Error(error);

      dateCols = cols.filter(c => c && c !== "Arcos ID" && c !== "Name");

      renderStats(rows);
      renderTable(cols, rows);

      const now = new Date().toLocaleString("en-IN", { dateStyle: "medium", timeStyle: "short" });
      document.getElementById("subtitle").textContent = `Last updated: ${now} · ${rows.length} records`;

    } catch (e) {
      document.getElementById("table-area").innerHTML = `<div class="error">Failed to load: ${e.message}</div>`;
      document.getElementById("subtitle").textContent = "Error loading data";
    }
  }

  function renderStats(rows) {
    let totalPresent = 0, totalAbsent = 0, totalCells = 0;

    rows.forEach(row => {
      dateCols.forEach(col => {
        const v = row[col];
        if (v === null || v === undefined || v === "") return;
        totalCells++;
        if (Number(v) === 1) totalPresent++;
        else totalAbsent++;
      });
    });

    const pct = totalCells > 0 ? Math.round((totalPresent / totalCells) * 100) : 0;

    document.getElementById("stats").innerHTML = `
      <div class="stat-card">
        <div class="label">Total employees</div>
        <div class="value">${rows.length}</div>
      </div>
      <div class="stat-card">
        <div class="label">Days tracked</div>
        <div class="value">${dateCols.length}</div>
      </div>
      <div class="stat-card">
        <div class="label">Present entries</div>
        <div class="value green">${totalPresent}</div>
      </div>
      <div class="stat-card">
        <div class="label">Absent entries</div>
        <div class="value red">${totalAbsent}</div>
      </div>
      <div class="stat-card">
        <div class="label">Overall attendance</div>
        <div class="value ${pct >= 75 ? 'green' : 'red'}">${pct}%</div>
      </div>
    `;
  }

  function renderTable(cols, rows) {
    if (!rows.length) {
      document.getElementById("table-area").innerHTML = '<div class="loading">No data found.</div>';
      return;
    }

    const validCols = cols.filter(c => c && c.trim() !== "");

    const headers = validCols.map(c => `<th>${c}</th>`).join("");

    const bodyRows = rows.map(row => {
      const cells = validCols.map(col => {
        const v = row[col];
        if (col === "Arcos ID" || col === "Name") {
          return `<td>${v ?? ""}</td>`;
        }
        if (v === null || v === undefined || v === "") {
          return `<td><span class="badge na">-</span></td>`;
        }
        const n = Number(v);
        if (n === 1) return `<td><span class="badge present">Present</span></td>`;
        if (n === 0) return `<td><span class="badge absent">Absent</span></td>`;
        return `<td>${v}</td>`;
      }).join("");
      return `<tr>${cells}</tr>`;
    }).join("");

    document.getElementById("table-area").innerHTML = `
      <table>
        <thead><tr>${headers}</tr></thead>
        <tbody>${bodyRows}</tbody>
      </table>
    `;
  }

  loadData();
</script>
</body>
</html>
