<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Employee Data</title>

<style>
body{
    font-family:Arial,sans-serif;
    padding:15px;
}

.item{
    background:#f5f5f5;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
}

.label{
    font-weight:bold;
}
</style>
</head>
<body>

<h2>Your Details</h2>

<div id="data"></div>

<script>

async function loadUser(){

    const res =
        await fetch('/user');

    const json =
        await res.json();

    if(!json.success){
        location.href='/';
        return;
    }

    const container =
        document.getElementById('data');

    for(const key in json.data){

        const div =
            document.createElement('div');

        div.className='item';

        div.innerHTML=
            `<div class="label">${key}</div>
             <div>${json.data[key]}</div>`;

        container.appendChild(div);
    }
}

loadUser();

</script>

</body>
</html>
