<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
@font-face {
    font-family: "CFont";
    src: url("font.woff") format("woff");
}

*{
    font-family: "CFont", Arial, Helvetica, sans-serif;
    -webkit-tap-highlight-color: transparent;
    box-sizing: border-box;
}

body{
    margin:20px;
}

h1{
    margin-bottom:0;
}

span{
    color:#666;
}

button{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    background:#fff;
    border:2px solid #dadce0;
    border-radius:3rem;
    padding:1rem;
    margin-top:30px;
    width:220px;
}

button:active{
    background:whitesmoke;
}

img{
    height:150px;
}

button:active{
    scale:.97;
}
</style>
</head>

<body>

<h1 id="name">Loading...</h1>
<span id="id"></span>

<a href="schedule.html">
    <button>
        <img src="schedule.png" alt="Schedule">
        My Schedule
    </button>
</a>

<script>

async function loadUser(){

    const res = await fetch('/user');
    const json = await res.json();

    if(!json.success){
        location.href='/';
        return;
    }

    document.getElementById('name').textContent =
        'Hi, ' + json.data["Name"];

    document.getElementById('id').textContent =
        json.data["Arcos ID"];
}

loadUser();

</script>

</body>
</html>
