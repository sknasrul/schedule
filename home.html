<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Duty Board · Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0a0f1c;
    --panel:#121a2c;
    --panel-border:#23304a;
    --text:#e8edf6;
    --muted:#7c8aa5;
    --amber:#ffb23f;
    --cyan:#36d1dc;
    --slate:#5b6b8c;
    --danger:#ff6b6b;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, rgba(54,209,220,0.07), transparent 40%),
      radial-gradient(circle at 90% 100%, rgba(255,178,63,0.06), transparent 40%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
  }

  .loading-screen{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--bg); z-index:20;
    flex-direction:column; gap:14px;
  }
  .spinner{
    width:26px;height:26px;border-radius:50%;
    border:3px solid rgba(124,138,165,0.25);
    border-top-color:var(--cyan);
    animation:spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg);} }
  .loading-screen span{ color:var(--muted); font-size:12.5px; letter-spacing:0.5px; }

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 24px;
    border-bottom:1px solid var(--panel-border);
    max-width:760px; margin:0 auto;
  }
  .who{ display:flex; align-items:center; gap:12px; }
  .avatar{
    width:38px; height:38px; border-radius:10px;
    background:linear-gradient(135deg, var(--amber), var(--cyan));
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk',sans-serif; font-weight:700; color:#0a0f1c; font-size:15px;
    flex:none;
  }
  .who-name{ font-weight:600; font-size:14.5px; }
  .who-id{ font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--muted); margin-top:1px; }

  .logout-btn{
    background:transparent;
    border:1px solid var(--panel-border);
    color:var(--muted);
    font-size:12.5px;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    transition:border-color .2s, color .2s;
  }
  .logout-btn:hover{ border-color:var(--danger); color:var(--danger); }

  main{ max-width:760px; margin:0 auto; padding:28px 24px 60px; }

  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--muted); margin-bottom:8px;
  }

  .today-card{
    background:linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.01));
    border:1px solid var(--panel-border);
    border-left:4px solid var(--slate);
    border-radius:var(--radius);
    padding:26px 26px;
    margin-bottom:28px;
    position:relative;
    overflow:hidden;
    animation: rise .5s cubic-bezier(.2,.8,.2,1);
  }
  .today-card.day{ border-left-color:var(--amber); }
  .today-card.night{ border-left-color:var(--cyan); }
  .today-card.off{ border-left-color:var(--slate); }

  @keyframes rise{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }

  .today-date{
    font-family:'JetBrains Mono',monospace;
    color:var(--muted); font-size:12.5px; margin-bottom:10px;
  }
  .today-shift{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700; font-size:30px; line-height:1.15;
  }
  .today-shift.day{ color:var(--amber); }
  .today-shift.night{ color:var(--cyan); }
  .today-shift.off{ color:#a8b6d4; }

  .pill{
    display:inline-block;
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px; letter-spacing:0.8px; text-transform:uppercase;
    padding:4px 9px; border-radius:99px;
    margin-top:12px;
    background:rgba(255,255,255,0.06);
    color:var(--muted);
  }

  .schedule-toggle{
    width:100%;
    display:flex; align-items:center; justify-content:space-between;
    background:var(--panel);
    border:1px solid var(--panel-border);
    color:var(--text);
    padding:15px 20px;
    border-radius:var(--radius);
    cursor:pointer;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600; font-size:14.5px;
    transition:border-color .2s;
  }
  .schedule-toggle:hover{ border-color:var(--cyan); }
  .schedule-toggle .chev{ transition:transform .25s ease; color:var(--muted); }
  .schedule-toggle.open .chev{ transform:rotate(180deg); }

  .schedule-panel{
    max-height:0;
    overflow:hidden;
    transition:max-height .4s ease;
  }
  .schedule-panel.open{ max-height:2400px; }

  .board{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(108px, 1fr));
    gap:10px;
    padding:20px 2px 4px;
  }

  .chip{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:10px;
    padding:12px 12px 11px;
    opacity:0;
    transform:translateY(8px);
    animation: flap .4s ease forwards;
  }
  @keyframes flap{
    0%{ opacity:0; transform:translateY(8px) rotateX(35deg); }
    100%{ opacity:1; transform:translateY(0) rotateX(0); }
  }
  .chip-date{
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px; color:var(--muted); margin-bottom:7px; letter-spacing:0.3px;
  }
  .chip-shift{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600; font-size:13px; line-height:1.3;
  }
  .chip.day{ border-color:rgba(255,178,63,0.35); }
  .chip.day .chip-shift{ color:var(--amber); }
  .chip.night{ border-color:rgba(54,209,220,0.35); }
  .chip.night .chip-shift{ color:var(--cyan); }
  .chip.off .chip-shift{ color:#7c8aa5; }
  .chip.today{ box-shadow:0 0 0 1.5px rgba(255,255,255,0.25); }

  .empty-state{
    color:var(--muted); font-size:13px; padding:24px 4px;
  }

  @media (max-width:480px){
    .today-shift{ font-size:24px; }
    .board{ grid-template-columns:repeat(auto-fill, minmax(92px, 1fr)); }
  }
</style>
</head>
<body>

  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <span>LOADING YOUR SCHEDULE…</span>
  </div>

  <div class="topbar" id="topbar" style="display:none;">
    <div class="who">
      <div class="avatar" id="avatarInitial">–</div>
      <div>
        <div class="who-name" id="userName">—</div>
        <div class="who-id" id="userId">—</div>
      </div>
    </div>
    <button class="logout-btn" id="logoutBtn">Log out</button>
  </div>

  <main id="main" style="display:none;">
    <div class="eyebrow">Today</div>
    <div class="today-card" id="todayCard">
      <div class="today-date" id="todayDate">—</div>
      <div class="today-shift" id="todayShift">—</div>
      <span class="pill" id="todayPill">—</span>
    </div>

    <button class="schedule-toggle" id="scheduleToggle">
      <span>My Schedule</span>
      <span class="chev">▾</span>
    </button>
    <div class="schedule-panel" id="schedulePanel">
      <div class="board" id="board"></div>
    </div>
  </main>

<script>
  function classify(shiftText){
    const t = (shiftText || '').toLowerCase();
    if(!t || t.includes('off') || t.includes('leave') || t.includes('holiday')) return 'off';
    if(t.includes('night')) return 'night';
    if(t.includes('day') || t.includes('morning')) return 'day';
    return 'day';
  }

  function displayShift(shiftText){
    if(!shiftText || !shiftText.trim()) return 'Off / Not Scheduled';
    return shiftText;
  }

  async function init(){
    let data;
    try{
      const res = await fetch('/api/me', { credentials:'same-origin' });
      data = await res.json();
    }catch(e){
      window.location.replace('/index.html');
      return;
    }

    if(!data || !data.success){
      window.location.replace('/index.html');
      return;
    }

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('topbar').style.display = 'flex';
    document.getElementById('main').style.display = 'block';

    document.getElementById('userName').textContent = data.name;
    document.getElementById('userId').textContent = data.arcosId;
    document.getElementById('avatarInitial').textContent = (data.name || '?').trim().charAt(0).toUpperCase();

    const cat = classify(data.todayShift);
    document.getElementById('todayDate').textContent = data.today;
    const shiftEl = document.getElementById('todayShift');
    shiftEl.textContent = displayShift(data.todayShift);
    shiftEl.className = 'today-shift ' + cat;
    document.getElementById('todayCard').className = 'today-card ' + cat;
    document.getElementById('todayPill').textContent =
      cat === 'off' ? 'OFF DUTY' : cat === 'night' ? 'NIGHT SHIFT' : 'DAY SHIFT';

    const board = document.getElementById('board');
    const entries = Object.entries(data.schedule || {});
    if(entries.length === 0){
      board.innerHTML = '<div class="empty-state">No schedule entries found yet.</div>';
    }else{
      entries.forEach(([date, shift], i) => {
        const c = classify(shift);
        const chip = document.createElement('div');
        chip.className = 'chip ' + c + (date === data.today ? ' today' : '');
        chip.style.animationDelay = (i * 0.025) + 's';
        chip.innerHTML = `<div class="chip-date">${date}</div><div class="chip-shift">${displayShift(shift)}</div>`;
        board.appendChild(chip);
      });
    }

    const toggle = document.getElementById('scheduleToggle');
    const panel = document.getElementById('schedulePanel');
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      panel.classList.toggle('open');
    });
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try{ await fetch('/api/logout', { method:'POST', credentials:'same-origin' }); }catch(e){}
    window.location.replace('/index.html');
  });

  init();
</script>
</body>
</html>
