<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Forms</title>
<style>
:root{
  --ink:#1e293b;
  --ink-soft:#64748b;
  --card:rgba(255,255,255,0.6);
  --line:rgba(15,23,42,0.10);
  --teal:#0891b2;
  --teal-bright:#22d3ee;
  --present:#2F7A4F;   --present-bg:rgba(47,122,79,0.12);
  --shift:#2E6C9E;     --shift-bg:rgba(46,108,158,0.12);
  --absent:#B23A2E;    --absent-bg:rgba(178,58,46,0.12);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  background-image:
    linear-gradient(150deg, rgba(255,255,255,0.86) 0%, rgba(241,245,249,0.74) 45%, rgba(226,240,242,0.84) 100%),
    url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRsld00P-Uk05dRZhB_31vkySwWZDiXDKIODMK0wxEdMN_p26upEeBp7JY&s=10');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;
  background-color:#eef2f6;
}
.wrap{
  max-width:560px;
  margin:0 auto;
  padding:28px 16px 24px;
}
.section-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:4px 4px 12px;
}
.section-title h1{
  font-size:20px;
  font-weight:700;
  margin:0;
}
.count-pill{
  font-family:ui-monospace,'SFMono-Regular','Consolas',monospace;
  font-size:13px;
  color:var(--ink-soft);
  background:var(--card);
  border:1px solid var(--line);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  padding:4px 11px;
  border-radius:20px;
}
.search-box{
  margin:0 4px 14px;
}
.search-box input{
  width:100%;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:14.5px;
  color:var(--ink);
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 16px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  outline:none;
  transition:border-color .15s ease, box-shadow .15s ease;
}
.search-box input::placeholder{color:var(--ink-soft);}
.search-box input:focus{
  border-color:var(--teal);
  box-shadow:0 0 0 3px rgba(8,145,178,0.14);
}
.board{
  padding:2px;
}
.form-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px 18px;
  margin-bottom:10px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  cursor:pointer;
  text-decoration:none;
  color:inherit;
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.form-card:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 22px rgba(15,23,42,0.10);
  border-color:rgba(8,145,178,0.35);
}
.form-card:active{ transform:translateY(0); }
.form-left{
  display:flex;
  align-items:center;
  gap:14px;
  min-width:0;
}
.form-icon{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.form-icon svg{width:21px;height:21px;}
.form-text{display:flex;flex-direction:column;gap:2px;min-width:0;}
.form-title{font-size:15.5px;font-weight:600;}
.form-sub{
  font-family:ui-monospace,'SFMono-Regular','Consolas',monospace;
  font-size:11.5px;color:var(--ink-soft);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.open-pill{
  position:relative;
  font-family:ui-monospace,'SFMono-Regular','Consolas',monospace;
  font-size:14px;
  font-weight:700;
  color:#0e4a58;
  padding:11px 24px;
  border-radius:24px;
  white-space:nowrap;
  flex-shrink:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.55), rgba(255,255,255,0.18));
  border:1px solid rgba(255,255,255,0.6);
  backdrop-filter:blur(10px) saturate(160%);
  -webkit-backdrop-filter:blur(10px) saturate(160%);
  box-shadow:
    0 6px 16px rgba(8,145,178,0.18),
    inset 0 1px 0 rgba(255,255,255,0.8),
    inset 0 -1px 4px rgba(8,145,178,0.15);
  overflow:hidden;
  transition:transform .18s ease, box-shadow .18s ease;
}
.open-pill::before{
  content:"";
  position:absolute;
  top:0;left:-60%;
  width:40%;height:100%;
  background:linear-gradient(115deg, transparent, rgba(255,255,255,0.7), transparent);
  transform:skewX(-20deg);
}
.form-card:hover .open-pill{
  transform:scale(1.05);
  box-shadow:
    0 8px 20px rgba(8,145,178,0.24),
    inset 0 1px 0 rgba(255,255,255,0.9),
    inset 0 -1px 4px rgba(8,145,178,0.18);
}
#empty-msg{
  display:none;
  font-size:14px;
  color:var(--ink-soft);
  padding:30px 4px;
  text-align:center;
  background:var(--card);
  border-radius:16px;
  border:1px solid var(--line);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
@media (min-width:720px){
  .wrap{max-width:600px;padding-top:48px;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="section-title">
    <h1>Employee Forms</h1>
    <span class="count-pill" id="count-pill"></span>
  </div>

  <div class="search-box">
    <input type="text" id="search-input" placeholder="Search forms…" autocomplete="off">
  </div>

  <div class="board" id="board"></div>
  <div id="empty-msg">No forms match your search.</div>
</div>

<script>
const ICONS = {
  leave: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01"/></svg>',
  shift: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2.1l4 4-4 4"/><path d="M3 12.1v-2a4 4 0 0 1 4-4h14"/><path d="M7 21.9l-4-4 4-4"/><path d="M21 11.9v2a4 4 0 0 1-4 4H3"/></svg>',
  resignation: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>'
};

const FORMS = [
  { name:"Leave Application", key:"leave", color:"shift", url:"https://forms.gle/REPLACE_LEAVE" },
  { name:"Shift Change Request", key:"shift", color:"present", url:"https://forms.gle/REPLACE_SHIFT_CHANGE" },
  { name:"Resignation", key:"resignation", color:"absent", url:"https://forms.gle/REPLACE_RESIGNATION" }
];

function shortUrl(url){
  try{
    const u = new URL(url);
    return u.hostname + u.pathname;
  }catch(e){
    return url;
  }
}

function renderForms(list){
  const board = document.getElementById('board');
  const emptyMsg = document.getElementById('empty-msg');
  board.innerHTML = "";

  if(list.length === 0){
    emptyMsg.style.display = 'block';
    board.style.display = 'none';
    return;
  }
  emptyMsg.style.display = 'none';
  board.style.display = 'block';

  const frag = document.createDocumentFragment();
  list.forEach(f => {
    const a = document.createElement('a');
    a.className = 'form-card';
    a.href = f.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = `
      <div class="form-left">
        <div class="form-icon" style="background:var(--${f.color}-bg);color:var(--${f.color});">${ICONS[f.key]}</div>
        <div class="form-text">
          <div class="form-title">${f.name}</div>
          <div class="form-sub">${shortUrl(f.url)}</div>
        </div>
      </div>
      <span class="open-pill">Open</span>
    `;
    frag.appendChild(a);
  });
  board.appendChild(frag);
}

function init(){
  document.getElementById('count-pill').textContent = `${FORMS.length} forms`;
  renderForms(FORMS);

  document.getElementById('search-input').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    const filtered = FORMS.filter(f => f.name.toLowerCase().includes(q));
    renderForms(filtered);
  });
}

init();
</script>
</body>
</html>
