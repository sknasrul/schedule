<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Forms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ==========================================================================
     Same design language as the schedules / presents pages: light glass
     panels floating over a softly-washed photo background, teal accent,
     amber reserved for "today" style highlight elsewhere in the app.
     Fonts kept as Space Grotesk / IBM Plex Mono to match convention.
     ========================================================================== */
  :root{
    --ink:#1e293b;
    --ink-soft:#64748b;
    --card:rgba(255,255,255,0.6);
    --card-solid:#ffffff;
    --line:rgba(15,23,42,0.10);
    --teal:#0891b2;
    --teal-bright:#22d3ee;
    --amber:#c7912f;

    --present:#2F7A4F;   --present-bg:rgba(47,122,79,0.12);
    --shift:#2E6C9E;     --shift-bg:rgba(46,108,158,0.12);
    --weekoff:#B8860B;   --weekoff-bg:rgba(184,134,11,0.14);
    --absent:#B23A2E;    --absent-bg:rgba(178,58,46,0.12);
    --training:#6750A4;  --training-bg:rgba(103,80,164,0.12);
    --dl:#8C5A3C;        --dl-bg:rgba(140,90,60,0.12);
    --blank:#94a3b8;     --blank-bg:rgba(15,23,42,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    color:var(--ink);
    font-family:'Space Grotesk',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;

    background-image:
      linear-gradient(150deg, rgba(255,255,255,0.86) 0%, rgba(241,245,249,0.74) 45%, rgba(226,240,242,0.84) 100%),
      url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRsld00P-Uk05dRZhB_31vkySwWZDiXDKIODMK0wxEdMN_p26upEeBp7JY&s=10');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    background-color:#eef2f6;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:20px 16px 24px;
  }

  /* ---------- employee panel (glass, matches other pages' header) ---------- */
  .employee-panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:20px;
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    box-shadow:0 12px 30px rgba(15,23,42,0.10);
    display:flex;
    align-items:center;
    gap:14px;
    padding:16px 20px;
  }
  .avatar{
    width:48px;height:48px;border-radius:50%;
    background:linear-gradient(135deg, var(--teal-bright), var(--teal));
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:16px;color:#06232b;flex-shrink:0;
  }
  .emp-text{display:flex;flex-direction:column;gap:4px;min-width:0;}
  .emp-eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;letter-spacing:1.4px;text-transform:uppercase;
    color:var(--teal);font-weight:600;
  }
  .emp-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .name{font-size:19px;font-weight:700;letter-spacing:-0.1px;}
  .id{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;font-weight:500;color:var(--ink-soft);
    background:rgba(15,23,42,0.06);
    padding:3px 10px;border-radius:999px;white-space:nowrap;
  }

  /* ---------- section title ---------- */
  .section-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:26px 4px 12px;
  }
  .section-title h1{
    font-size:20px;
    font-weight:700;
    margin:0;
  }
  .count-pill{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:var(--ink-soft);
    background:var(--card);
    border:1px solid var(--line);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    padding:4px 11px;
    border-radius:20px;
  }

  /* ---------- search ---------- */
  .search-box{
    margin:0 4px 14px;
  }
  .search-box input{
    width:100%;
    font-family:'Space Grotesk',sans-serif;
    font-size:14.5px;
    color:var(--ink);
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px 16px;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .search-box input::placeholder{color:var(--ink-soft);}
  .search-box input:focus{
    border-color:var(--teal);
    box-shadow:0 0 0 3px rgba(8,145,178,0.14);
  }

  /* ---------- forms board ---------- */
  .board{
    max-height:66vh;
    overflow-y:auto;
    overflow-x:hidden;
    padding:2px;
    scrollbar-width:thin;
    scrollbar-color:rgba(15,23,42,0.2) transparent;
  }
  .board::-webkit-scrollbar{width:6px;}
  .board::-webkit-scrollbar-thumb{background:rgba(15,23,42,0.2);border-radius:10px;}

  .form-card{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:16px 18px;
    margin-bottom:10px;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    cursor:pointer;
    text-decoration:none;
    color:inherit;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .form-card:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 22px rgba(15,23,42,0.10);
    border-color:rgba(8,145,178,0.35);
  }
  .form-card:active{ transform:translateY(0); }

  .form-left{
    display:flex;
    align-items:center;
    gap:14px;
    min-width:0;
  }
  .form-icon{
    width:42px;height:42px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    font-size:19px;
  }
  .form-text{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .form-title{font-size:15.5px;font-weight:600;}
  .form-sub{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;color:var(--ink-soft);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .open-pill{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    font-weight:600;
    color:var(--teal);
    background:rgba(8,145,178,0.10);
    padding:7px 13px;
    border-radius:20px;
    white-space:nowrap;
    flex-shrink:0;
  }

  #empty-msg{
    display:none;
    font-size:14px;
    color:var(--ink-soft);
    padding:30px 4px;
    text-align:center;
    background:var(--card);
    border-radius:16px;
    border:1px solid var(--line);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
  }

  /* ---------- footer ---------- */
  .footer{
    margin-top:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
  }
  .live-dot{
    width:7px;height:7px;
    border-radius:50%;
    background:var(--present);
  }

  @media (max-width:420px){
    .name{font-size:17px;}
    .board{max-height:60vh;}
  }
  @media (min-width:720px){
    .wrap{max-width:600px;padding-top:48px;}
    .board{max-height:68vh;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="employee-panel">
    <div class="avatar" id="avatarInitials">--</div>
    <div class="emp-text">
      <span class="emp-eyebrow">Employee</span>
      <div class="emp-row">
        <span class="name" id="emp-name">Employee Forms</span>
        <span class="id" id="emp-id">—</span>
      </div>
    </div>
  </div>

  <div class="section-title">
    <h1>Forms</h1>
    <span class="count-pill" id="count-pill"></span>
  </div>

  <div class="search-box">
    <input type="text" id="search-input" placeholder="Search forms…" autocomplete="off">
  </div>

  <div class="board" id="board"></div>
  <div id="empty-msg">No forms match your search.</div>

  <div class="footer"><span class="live-dot"></span>Tap a form to open it</div>
</div>

<script>
/* ==========================================================================
   Replace each `url` below with the real published Google Form link for
   that form. Everything else (icons, colors, layout) will keep working
   as-is once the links are swapped in.
   ========================================================================== */
const FORMS = [
  { name:"Resignation",              icon:"📝", color:"absent",   url:"https://forms.gle/REPLACE_RESIGNATION" },
  { name:"Leave Application",        icon:"🌴", color:"shift",    url:"https://forms.gle/REPLACE_LEAVE" },
  { name:"Work From Home Request",   icon:"🏠", color:"training", url:"https://forms.gle/REPLACE_WFH" },
  { name:"Overtime Request",         icon:"⏱️", color:"weekoff",  url:"https://forms.gle/REPLACE_OVERTIME" },
  { name:"Reimbursement Claim",      icon:"💳", color:"present",  url:"https://forms.gle/REPLACE_REIMBURSEMENT" },
  { name:"Advance Salary Request",   icon:"💰", color:"dl",       url:"https://forms.gle/REPLACE_ADVANCE_SALARY" },
  { name:"Asset / Equipment Request",icon:"💻", color:"shift",    url:"https://forms.gle/REPLACE_ASSET_REQUEST" },
  { name:"ID Card Reissue",          icon:"🪪", color:"training", url:"https://forms.gle/REPLACE_ID_REISSUE" },
  { name:"Address / Details Update", icon:"📇", color:"present",  url:"https://forms.gle/REPLACE_DETAILS_UPDATE" },
  { name:"Grievance / Complaint",    icon:"⚠️", color:"absent",   url:"https://forms.gle/REPLACE_GRIEVANCE" },
  { name:"Loan Application",         icon:"🏦", color:"dl",       url:"https://forms.gle/REPLACE_LOAN" },
  { name:"Exit Interview",           icon:"🚪", color:"weekoff",  url:"https://forms.gle/REPLACE_EXIT_INTERVIEW" },
  { name:"Training Enrollment",      icon:"🎓", color:"training", url:"https://forms.gle/REPLACE_TRAINING" },
  { name:"Shift Change Request",     icon:"🔄", color:"shift",    url:"https://forms.gle/REPLACE_SHIFT_CHANGE" },
  { name:"General Feedback",         icon:"💬", color:"present",  url:"https://forms.gle/REPLACE_FEEDBACK" }
];

function getCookie(name){
  const match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([.$?*|{}()\[\]\\\/+^])/g,'\\$1') + '=([^;]*)'));
  return match ? decodeURIComponent(match[1]) : null;
}

function setHeader(){
  const id = getCookie('id');
  document.getElementById('emp-id').textContent = id || "—";
  document.getElementById('avatarInitials').textContent = "EF";
}

function shortUrl(url){
  try{
    const u = new URL(url);
    return u.hostname + u.pathname;
  }catch(e){
    return url;
  }
}

function renderForms(list){
  const board = document.getElementById('board');
  const emptyMsg = document.getElementById('empty-msg');
  board.innerHTML = "";

  if(list.length === 0){
    emptyMsg.style.display = 'block';
    board.style.display = 'none';
    return;
  }
  emptyMsg.style.display = 'none';
  board.style.display = 'block';

  list.forEach(f => {
    const a = document.createElement('a');
    a.className = 'form-card';
    a.href = f.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = `
      <div class="form-left">
        <div class="form-icon" style="background:var(--${f.color}-bg);">${f.icon}</div>
        <div class="form-text">
          <div class="form-title">${f.name}</div>
          <div class="form-sub">${shortUrl(f.url)}</div>
        </div>
      </div>
      <span class="open-pill">Open Form</span>
    `;
    board.appendChild(a);
  });
}

function init(){
  setHeader();
  document.getElementById('count-pill').textContent = `${FORMS.length} forms`;
  renderForms(FORMS);

  document.getElementById('search-input').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    const filtered = FORMS.filter(f => f.name.toLowerCase().includes(q));
    renderForms(filtered);
  });
}

init();
</script>
</body>
</html>
